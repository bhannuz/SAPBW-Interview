<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SAP Tech Library | AK Learning</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        :root { --sap-blue: #0070d2; --sap-gold: #f39c12; --bg-dark: #0f172a; --card-bg: #1e293b; --text-main: #f8fafc; }
        body { background-color: var(--bg-dark); color: var(--text-main); font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        .sidebar { background: var(--card-bg); height: 100vh; padding: 20px; border-right: 1px solid #334155; position: fixed; width: 250px; }
        .main-content { margin-left: 250px; padding: 40px; }
        .module-btn { width: 100%; text-align: left; background: transparent; border: none; color: #94a3b8; padding: 12px; border-radius: 8px; margin-bottom: 5px; transition: 0.3s; }
        .module-btn:hover, .module-btn.active { background: var(--sap-blue); color: white; }
        .tech-card { background: var(--card-bg); border-radius: 12px; padding: 25px; margin-bottom: 20px; border-left: 5px solid var(--sap-gold); }
        .code-block { background: #000; color: #2ecc71; padding: 15px; border-radius: 8px; font-family: monospace; font-size: 0.9rem; margin: 10px 0; }
        .search-box { background: #334155; border: none; color: white; border-radius: 20px; padding: 10px 20px; width: 100%; margin-bottom: 30px; }
        .badge-sap { background: var(--sap-blue); font-size: 0.7rem; vertical-align: middle; margin-left: 10px; }
        @media (max-width: 768px) { .sidebar { width: 100%; height: auto; position: relative; } .main-content { margin-left: 0; } }
    </style>
</head>
<body>

<div class="sidebar">
    <h4 class="text-warning mb-4">SAP Library</h4>
    <button class="module-btn active" onclick="showModule('bw')">SAP BW / BW4HANA</button>
    <button class="module-btn" onclick="showModule('hana')">SAP HANA</button>
    <button class="module-btn" onclick="showModule('bo')">BO / WebI</button>
    <button class="module-btn" onclick="showModule('afo')">AFO</button>
    <hr>
    <div class="small text-secondary">Tech Guides v1.0</div>
</div>

<div class="main-content">
    <input type="text" id="searchInput" class="search-box" placeholder="🔍 Search definitions or objects (e.g. Routines, V3)..." onkeyup="searchTech()">
    
    <div id="content-area">
        </div>
</div>

<script>
    const sapData = {
        bw: {
            title: "SAP Business Warehouse (BW)",
            items: [
                {
                    name: "InfoObject (IOBJ)",
                    def: "The smallest unit in SAP BW. Types include Characteristics, Key Figures, Units, Time, and Technical characteristics."
                },
                {
                    name: "Transformation (TRFN)",
                    def: "Used to map source fields to target InfoObjects. Contains rule types like Direct, Constant, Formula, and Routines."
                },
                {
                    name: "Routines",
                    def: "ABAP code snippets used in Transformations. Types: Start Routine (filtering), Field Routine (logic per record), End Routine (post-processing), and Expert Routine."
                },
                {
                    name: "DataSource Enhancement Steps",
                    def: "How to add custom fields to standard extractors:",
                    list: [
                        "Step 1: Go to RSA6, select DataSource.",
                        "Step 2: Double click 'Append Structure' and add custom fields (starting with ZZ).",
                        "Step 3: Write logic in CMOD (Function Exit EXIT_SAPLRSAP_001).",
                        "Step 4: Reactivate DataSource and uncheck 'Hide' in RSA6.",
                        "Step 5: Replicate in BW and map fields."
                    ]
                },
                {
                    name: "Pre & Post Enhancement Activities",
                    def: "Safety checks for data integrity:",
                    list: [
                        "Pre-Activity: Clear Delta Queues (RSA7) and ensure no active jobs are running.",
                        "Pre-Activity: Note down current field mappings.",
                        "Post-Activity: Extract data in RSA3 to verify logic.",
                        "Post-Activity: Delete and rebuild Init/Delta in BW if structural changes were made."
                    ]
                },
                {
                    name: "Update Modes (V1, V2, V3)",
                    def: "The logic of how data moves from R/3 to Queues:",
                    table: [
                        ["V1 (Synchronous)", "Immediate update to tables. High priority."],
                        ["V2 (Asynchronous)", "Update happens shortly after V1. Statistically less critical."],
                        ["V3 (Batch)", "Serialized update. Data sits in outbound queue until a background job (LBWE) moves it."]
                    ]
                }
            ]
        },
        hana: {
            title: "SAP HANA Development",
            items: [
                { name: "Calculation Views", def: "A powerful modeling tool in HANA to combine data from multiple tables using Joins, Unions, and Projections." },
                { name: "SDA (Smart Data Access)", def: "Virtualizing data from external databases without moving it into HANA." }
            ]
        },
        bo: {
            title: "SAP BusinessObjects (BO)",
            items: [
                { name: "Web Intelligence (WebI)", def: "Ad-hoc reporting tool for business users to create formatted reports." },
                { name: "Universe (IDT/UDT)", def: "The semantic layer between the database and the report." }
            ]
        },
        afo: {
            title: "Analysis for Office (AFO)",
            items: [
                { name: "Excel Add-in", def: "Allows multidimensional analysis of OLAP sources (BW, HANA) directly in Microsoft Excel." }
            ]
        }
    };

    function showModule(mod) {
        // Update Sidebar Active State
        document.querySelectorAll('.module-btn').forEach(btn => btn.classList.remove('active'));
        event.target.classList.add('active');

        const data = sapData[mod];
        let html = `<h2>${data.title}</h2><hr class="mb-4">`;
        
        data.items.forEach(item => {
            html += `
                <div class="tech-card">
                    <h4 class="text-info">${item.name}</h4>
                    <p>${item.def}</p>
            `;
            
            if(item.list) {
                html += '<ul>' + item.list.map(l => `<li>${l}</li>`).join('') + '</ul>';
            }

            if(item.table) {
                html += `<table class="table table-dark table-sm mt-2">
                    ${item.table.map(row => `<tr><td><strong>${row[0]}</strong></td><td>${row[1]}</td></tr>`).join('')}
                </table>`;
            }

            html += `</div>`;
        });
        
        document.getElementById('content-area').innerHTML = html;
    }

    function searchTech() {
        let input = document.getElementById('searchInput').value.toLowerCase();
        let cards = document.getElementsByClassName('tech-card');
        
        for (let i = 0; i < cards.length; i++) {
            let title = cards[i].getElementsByTagName('h4')[0].innerText.toLowerCase();
            let body = cards[i].getElementsByTagName('p')[0].innerText.toLowerCase();
            if (title.includes(input) || body.includes(input)) {
                cards[i].style.display = "";
            } else {
                cards[i].style.display = "none";
            }
        }
    }

    // Initial Load
    showModule('bw');
</script>

</body>
</html>
