<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SAP Knowledge Vault</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background: #0f172a; color: white; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        .sidebar { background: #1e293b; padding: 20px; width: 260px; height: 100vh; position: fixed; left: 0; top: 0; overflow-y: auto; border-right: 1px solid #334155; }
        .main-content { margin-left: 260px; padding: 30px; }
        .module-btn { width: 100%; background: none; border: none; color: #94a3b8; text-align: left; padding: 12px; border-radius: 8px; margin-bottom: 6px; transition: 0.2s; }
        .module-btn:hover, .module-btn.active { background: #0070d2; color: white; }
        .tech-card { background: #1e293b; padding: 20px; border-left: 4px solid orange; border-radius: 10px; margin-bottom: 15px; cursor: pointer; transition: 0.3s; }
        .tech-card:hover { transform: translateX(5px); box-shadow: 0 0 15px rgba(0, 112, 210, 0.3); }
        .popup { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); display: none; align-items: center; justify-content: center; z-index: 2000; }
        .popup-content { background: #1e293b; padding: 30px; border-radius: 12px; max-width: 500px; width: 90%; border: 1px solid #334155; }
        @media(max-width:768px){
            .sidebar { position: relative; width: 100%; height: auto; border-right: none; }
            .main-content { margin-left: 0; padding: 20px; }
        }
    </style>
</head>
<body>

<div class="sidebar">
    <h4 class="mb-4">📚 SAP Library</h4>
    <div id="moduleNav"></div>
</div>

<div class="main-content">
    <div class="d-flex gap-3 mb-4 flex-wrap">
        <input id="searchInput" class="form-control" placeholder="Search topic..." onkeyup="searchTech()" style="max-width:400px">
        <button class="btn btn-warning" onclick="openEditModal(null)">+ Add New Topic</button>
    </div>
    <div id="content-area"></div>
</div>

<div class="popup" id="topicPopup">
    <div class="popup-content">
        <h4 id="popupTitle" class="text-warning"></h4>
        <hr>
        <p id="popupDef" class="text-light"></p>
        <ul id="popupList" class="mt-3"></ul>
        <div class="d-flex gap-2 mt-4">
            <button class="btn btn-secondary" onclick="closePopup()">Close</button>
            <button id="editBtn" class="btn btn-primary">Edit / Delete</button>
        </div>
    </div>
</div>

<div class="modal fade" id="editModal" tabindex="-1">
    <div class="modal-dialog">
        <div class="modal-content bg-dark text-white border-secondary">
            <div class="modal-header border-secondary">
                <h5 id="modalTitle">Topic Details</h5>
                <button class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <input type="hidden" id="editIndex">
                <div class="mb-3">
                    <label class="form-label">Topic Name</label>
                    <input id="editName" class="form-control bg-secondary text-white border-0">
                </div>
                <div class="mb-3">
                    <label class="form-label">Definition</label>
                    <textarea id="editDef" class="form-control bg-secondary text-white border-0" rows="3"></textarea>
                </div>
                <div class="mb-3">
                    <label class="form-label">Key Points (One per line)</label>
                    <textarea id="editList" class="form-control bg-secondary text-white border-0" rows="5" placeholder="Feature 1&#10;Feature 2"></textarea>
                </div>
            </div>
            <div class="modal-footer border-secondary">
                <button id="deleteBtn" class="btn btn-danger me-auto" onclick="deleteTopic()">Delete Topic</button>
                <button class="btn btn-outline-light" data-bs-dismiss="modal">Cancel</button>
                <button class="btn btn-primary" onclick="saveTopic()">Save Changes</button>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
    import { getFirestore, collection, addDoc, updateDoc, deleteDoc, doc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyB9_sBL83sKvIaOvAE8msHw1WQ80QwhxfU",
        authDomain: "ak-chit-funds.firebaseapp.com",
        projectId: "ak-chit-funds",
        storageBucket: "ak-chit-funds.firebasestorage.app",
        messagingSenderId: "297195194526",
        appId: "1:297195194526:web:d446e1bc4f92918611938f"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    let currentModule = "bw";
    let sapData = {};
    let editModalInstance;

    const MODULES = {
        bw: "SAP BW",
        datasphere: "SAP Datasphere",
        sac: "SAP SAC",
        hana: "SAP HANA",
        bo: "SAP BO/WebI"
    };

    window.addEventListener("load", () => {
        editModalInstance = new bootstrap.Modal(document.getElementById("editModal"));
        initModules();
        listenTopics();
    });

    function initModules() {
        const nav = document.getElementById("moduleNav");
        nav.innerHTML = "";
        Object.keys(MODULES).forEach(k => {
            const btn = document.createElement("button");
            btn.className = "module-btn " + (k === currentModule ? "active" : "");
            btn.innerText = MODULES[k];
            btn.onclick = () => {
                currentModule = k;
                initModules();
                render();
            };
            nav.appendChild(btn);
        });
    }

    function listenTopics() {
        onSnapshot(collection(db, "sap_topics"), (snapshot) => {
            sapData = {};
            Object.keys(MODULES).forEach(m => { sapData[m] = { title: MODULES[m], items: [] }; });
            snapshot.forEach(d => {
                const data = d.data();
                if(sapData[data.module]) {
                    sapData[data.module].items.push({ id: d.id, ...data });
                }
            });
            render();
        });
    }

    function render() {
        const data = sapData[currentModule];
        const container = document.getElementById("content-area");
        if (!data) return;
        
        let html = `<h3 class="mb-4">${data.title}</h3>`;
        if (data.items.length === 0) html += `<p class="text-muted">No topics found in this module. Add one!</p>`;
        
        data.items.forEach((item, i) => {
            html += `<div class="tech-card" onclick="openPopup(${i})"><h5>${item.name}</h5></div>`;
        });
        container.innerHTML = html;
    }

    window.openPopup = function(i) {
        const t = sapData[currentModule].items[i];
        document.getElementById("popupTitle").innerText = t.name;
        document.getElementById("popupDef").innerText = t.def;
        document.getElementById("popupList").innerHTML = t.list.map(x => `<li>${x}</li>`).join("");
        
        const editBtn = document.getElementById("editBtn");
        editBtn.onclick = () => { closePopup(); openEditModal(i); };
        
        document.getElementById("topicPopup").style.display = "flex";
    }

    window.closePopup = function() { document.getElementById("topicPopup").style.display = "none"; }

    window.openEditModal = function(i) {
        const idxInput = document.getElementById("editIndex");
        const delBtn = document.getElementById("deleteBtn");
        
        if (i !== null) {
            const t = sapData[currentModule].items[i];
            idxInput.value = i;
            document.getElementById("editName").value = t.name;
            document.getElementById("editDef").value = t.def;
            document.getElementById("editList").value = t.list.join("\n");
            delBtn.style.display = "block";
            document.getElementById("modalTitle").innerText = "Edit Topic";
        } else {
            idxInput.value = "";
            document.getElementById("editName").value = "";
            document.getElementById("editDef").value = "";
            document.getElementById("editList").value = "";
            delBtn.style.display = "none";
            document.getElementById("modalTitle").innerText = "Add New Topic";
        }
        editModalInstance.show();
    }

    window.saveTopic = async function() {
        const idx = document.getElementById("editIndex").value;
        const item = {
            module: currentModule,
            name: document.getElementById("editName").value,
            def: document.getElementById("editDef").value,
            list: document.getElementById("editList").value.split("\n").filter(x => x.trim() !== "")
        };

        try {
            if (idx === "") {
                await addDoc(collection(db, "sap_topics"), item);
            } else {
                const id = sapData[currentModule].items[idx].id;
                await updateDoc(doc(db, "sap_topics", id), item);
            }
            editModalInstance.hide();
        } catch (e) { alert("Error saving: " + e.message); }
    }

    window.deleteTopic = async function() {
        const idx = document.getElementById("editIndex").value;
        if (idx === "" || !confirm("Are you sure you want to delete this topic?")) return;
        
        try {
            const id = sapData[currentModule].items[idx].id;
            await deleteDoc(doc(db, "sap_topics", id));
            editModalInstance.hide();
        } catch (e) { alert("Error deleting: " + e.message); }
    }

    window.searchTech = function() {
        const term = document.getElementById("searchInput").value.toLowerCase();
        document.querySelectorAll(".tech-card").forEach(c => {
            c.style.display = c.innerText.toLowerCase().includes(term) ? "" : "none";
        });
    }
</script>

</body>
</html>
