<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SAP Master Library | Phone Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-database.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-auth.js"></script>
    <style>
        :root { --sap-blue: #0070d2; --sap-gold: #f39c12; --bg-dark: #0f172a; --card-bg: #1e293b; --text-main: #f8fafc; --text-dim: #94a3b8; }
        body { background-color: var(--bg-dark); color: var(--text-main); font-family: 'Segoe UI', sans-serif; padding-bottom: 50px; }
        
        .sidebar { background: var(--card-bg); height: 100vh; padding: 25px; border-right: 1px solid #334155; position: fixed; width: 280px; overflow-y: auto; z-index: 1000; }
        .main-content { margin-left: 280px; padding: 40px; min-height: 100vh; }
        
        .module-btn { width: 100%; text-align: left; background: transparent; border: none; color: var(--text-dim); padding: 12px 15px; border-radius: 10px; margin-bottom: 8px; transition: 0.3s; }
        .module-btn:hover, .module-btn.active { background: var(--sap-blue); color: white; }

        .tech-card { background: var(--card-bg); border-radius: 15px; padding: 25px; margin-bottom: 20px; border-left: 5px solid var(--sap-gold); position: relative; cursor: pointer; transition: 0.3s; }
        .tech-card:hover { transform: translateX(5px); box-shadow: 0 0 20px rgba(0, 112, 210, 0.3); }
        .edit-btn { position: absolute; top: 15px; right: 15px; background: none; border: none; color: var(--sap-blue); cursor: pointer; font-size: 1.2rem; z-index: 10; }
        .edit-btn:hover { color: var(--sap-gold); }
        
        .search-box { background: #334155; border: 1px solid #475569; color: white; border-radius: 12px; padding: 12px 20px; width: 100%; }
        .search-box:focus { background: #334155; color: white; border-color: var(--sap-gold); outline: none; }
        
        .modal-content { background: var(--card-bg); color: white; border: 1px solid #475569; }
        .form-control { background: #334155; border: 1px solid #475569; color: white; }
        .form-control:focus { background: #334155; color: white; border-color: var(--sap-gold); box-shadow: none; }

        /* Phone Login Screen */
        .phone-login-container {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #0f172a 0%, #1a1f2e 100%);
        }

        .phone-login-card {
            background: var(--card-bg);
            border: 2px solid var(--sap-gold);
            border-radius: 20px;
            padding: 40px;
            max-width: 400px;
            width: 90%;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.5);
        }

        .phone-title {
            color: var(--sap-gold);
            font-size: 2rem;
            font-weight: bold;
            margin-bottom: 10px;
            text-align: center;
        }

        .phone-subtitle {
            color: var(--text-dim);
            text-align: center;
            margin-bottom: 30px;
            font-size: 0.95rem;
        }

        .phone-input {
            background: #334155;
            border: 2px solid #475569;
            color: white;
            padding: 15px;
            margin-bottom: 20px;
            border-radius: 10px;
            width: 100%;
            font-size: 1.1rem;
            text-align: center;
        }

        .phone-input:focus {
            background: #334155;
            color: white;
            border-color: var(--sap-gold);
            outline: none;
            box-shadow: 0 0 10px rgba(243, 156, 18, 0.3);
        }

        .phone-btn-login {
            background: var(--sap-gold);
            color: var(--bg-dark);
            border: none;
            padding: 15px 20px;
            border-radius: 10px;
            font-weight: bold;
            width: 100%;
            cursor: pointer;
            margin-bottom: 10px;
            transition: 0.3s;
            font-size: 1rem;
        }

        .phone-btn-login:hover:not(:disabled) {
            background: #e8a412;
            transform: translateY(-2px);
        }

        .phone-btn-login:disabled {
            background: #666;
            cursor: not-allowed;
        }

        .phone-error {
            color: #e74c3c;
            text-align: center;
            margin-top: 15px;
            font-size: 0.9rem;
            display: none;
        }

        .phone-success {
            color: #2ecc71;
            text-align: center;
            margin-top: 15px;
            font-size: 0.9rem;
            display: none;
        }

        .phone-info {
            background: rgba(0, 112, 210, 0.1);
            border: 1px solid var(--sap-blue);
            border-radius: 8px;
            padding: 15px;
            margin-top: 20px;
            font-size: 0.85rem;
            color: var(--text-dim);
            line-height: 1.6;
        }

        .phone-info strong {
            color: var(--sap-gold);
        }

        .user-section {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: rgba(0, 112, 210, 0.1);
            border: 1px solid var(--sap-blue);
            border-radius: 8px;
            padding: 10px 15px;
            margin-bottom: 20px;
        }

        .user-text {
            color: var(--text-dim);
            font-size: 0.9rem;
        }

        .logout-btn {
            background: #e74c3c;
            color: white;
            border: none;
            padding: 5px 12px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 0.85rem;
        }

        .logout-btn:hover {
            background: #c0392b;
        }

        .sync-status {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: var(--card-bg);
            border: 1px solid #334155;
            border-radius: 8px;
            padding: 10px 15px;
            font-size: 0.85rem;
            z-index: 999;
        }

        .sync-status.synced { color: #2ecc71; }
        .sync-status.error { color: #e74c3c; }

        /* Topic Popup Modal */
        .topic-popup {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.7);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 2000;
            opacity: 0;
            visibility: hidden;
            transition: opacity 0.3s ease, visibility 0.3s ease;
        }

        .topic-popup.show {
            opacity: 1;
            visibility: visible;
        }

        .topic-popup-content {
            background: var(--card-bg);
            border: 2px solid var(--sap-gold);
            border-radius: 20px;
            padding: 35px;
            max-width: 600px;
            width: 90%;
            max-height: 85vh;
            overflow-y: auto;
            position: relative;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.5);
            animation: slideIn 0.3s ease;
        }

        @keyframes slideIn {
            from { transform: translateY(-50px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }

        .popup-close {
            position: absolute;
            top: 15px;
            right: 20px;
            background: none;
            border: none;
            color: var(--sap-gold);
            font-size: 2rem;
            cursor: pointer;
            transition: 0.2s;
            line-height: 1;
        }

        .popup-close:hover {
            color: #ff6b35;
            transform: scale(1.2);
        }

        .popup-title {
            color: var(--sap-gold);
            font-size: 1.8rem;
            font-weight: bold;
            margin-bottom: 20px;
            border-bottom: 2px solid var(--sap-gold);
            padding-bottom: 15px;
        }

        .popup-definition {
            background: rgba(0, 112, 210, 0.1);
            border-left: 4px solid var(--sap-gold);
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
            font-size: 1.05rem;
            line-height: 1.6;
        }

        .popup-points-title {
            color: var(--sap-gold);
            font-weight: bold;
            margin-top: 20px;
            margin-bottom: 12px;
            font-size: 1.1rem;
        }

        .popup-list {
            list-style: none;
            padding: 0;
        }

        .popup-list li {
            padding: 10px 0;
            padding-left: 25px;
            position: relative;
            color: var(--text-dim);
            line-height: 1.5;
        }

        .popup-list li:before {
            content: "▸";
            position: absolute;
            left: 0;
            color: var(--sap-gold);
            font-size: 1.2rem;
        }

        .popup-actions {
            display: flex;
            gap: 10px;
            margin-top: 25px;
            padding-top: 20px;
            border-top: 1px solid #334155;
        }

        .popup-actions button {
            flex: 1;
            padding: 10px 15px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            transition: 0.3s;
            font-size: 0.95rem;
        }

        .popup-edit-btn {
            background: var(--sap-blue);
            color: white;
        }

        .popup-edit-btn:hover {
            background: #0052a3;
            transform: translateY(-2px);
        }

        .popup-close-btn {
            background: #334155;
            color: var(--text-main);
        }

        .popup-close-btn:hover {
            background: #475569;
            transform: translateY(-2px);
        }

        .hidden { display: none !important; }

        @media (max-width: 992px) { 
            .sidebar { width: 100%; height: auto; position: relative; display: flex; overflow-x: auto; padding: 15px; }
            .main-content { margin-left: 0; padding: 20px; }
            .sidebar h4, .sidebar hr { display: none; }
            .topic-popup-content { padding: 25px; margin: 20px; }
            .popup-title { font-size: 1.4rem; }
        }
    </style>
</head>
<body>

<!-- Phone Login Screen -->
<div id="phoneScreen" class="phone-login-container">
    <div class="phone-login-card">
        <div class="phone-title">📱 SAP Library</div>
        <div class="phone-subtitle">Login with Phone Number</div>
        
        <input 
            type="tel" 
            id="phoneInput" 
            class="phone-input" 
            placeholder="Enter your phone number"
            inputmode="numeric"
            onkeypress="if(event.key==='Enter') handlePhoneLogin()"
        />

        <button class="phone-btn-login" id="loginBtn" onclick="handlePhoneLogin()">
            🔓 Login / Sign Up
        </button>

        <div class="phone-error" id="phoneError"></div>
        <div class="phone-success" id="phoneSuccess"></div>

        <div class="phone-info">
            <strong>ℹ️ How it works:</strong><br>
            • Enter your phone number<br>
            • First time? Auto account created<br>
            • Returns? Auto login<br>
            • Data syncs to cloud ☁️<br>
            • Use any device with same number
        </div>
    </div>
</div>

<!-- Main App Screen -->
<div id="appScreen" class="hidden">
    <div class="sidebar" id="sidebar">
        <h4 class="text-warning mb-3">📚 SAP Library</h4>
        
        <div class="user-section">
            <div class="user-text" id="userPhone">📱 User</div>
            <button class="logout-btn" onclick="handleLogout()">Logout</button>
        </div>

        <div id="moduleNav"></div>
    </div>

    <div class="main-content">
        <div class="d-flex justify-content-between align-items-center mb-4 gap-3 flex-wrap">
            <input type="text" id="searchInput" class="search-box" placeholder="🔍 Search topics..." onkeyup="searchTech()" style="flex: 1; min-width: 200px;">
            <button class="btn btn-warning fw-bold px-4" onclick="openEditModal(null)">➕ Add Topic</button>
        </div>

        <div class="form-check form-switch mb-4">
            <input class="form-check-input" type="checkbox" id="quizSwitch" onchange="toggleQuizMode()">
            <label class="form-check-label small fw-bold" for="quizSwitch">🎯 QUIZ MODE</label>
        </div>

        <div id="content-area"></div>

        <div class="sync-status synced" id="syncStatus">✓ Synced</div>
    </div>
</div>

<!-- Topic Popup Modal -->
<div class="topic-popup" id="topicPopup">
    <div class="topic-popup-content">
        <button class="popup-close" onclick="closeTopicPopup()">×</button>
        <div class="popup-title" id="popupTitle">Topic Name</div>
        <div class="popup-definition" id="popupDefinition">Definition text here</div>
        <div class="popup-points-title">Key Points:</div>
        <ul class="popup-list" id="popupList"></ul>
        <div class="popup-actions">
            <button class="popup-edit-btn" onclick="editFromPopup()">✏️ Edit Topic</button>
            <button class="popup-close-btn" onclick="closeTopicPopup()">Close</button>
        </div>
    </div>
</div>

<!-- Edit Modal -->
<div class="modal fade" id="editModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-lg">
        <div class="modal-content">
            <div class="modal-header border-secondary">
                <h5 class="modal-title">Edit Technical Topic</h5>
                <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <input type="hidden" id="editIndex">
                <div class="mb-3">
                    <label class="form-label text-warning">Topic / Question</label>
                    <input type="text" id="editName" class="form-control">
                </div>
                <div class="mb-3">
                    <label class="form-label text-warning">Definition / Answer</label>
                    <textarea id="editDef" class="form-control" rows="4"></textarea>
                </div>
                <div class="mb-3">
                    <label class="form-label text-warning">Bullet Points (One per line)</label>
                    <textarea id="editList" class="form-control" rows="4" placeholder="Step 1...&#10;Step 2..."></textarea>
                </div>
            </div>
            <div class="modal-footer border-secondary">
                <button class="btn btn-danger me-auto" onclick="deleteTopic()">Delete Topic</button>
                <button class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                <button class="btn btn-primary" onclick="saveTopic()">Save Changes</button>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
    // Firebase Config
    const firebaseConfig = {
        apiKey: "AIzaSyCqb7gAbpa3UabPU3g_YhNITuPWtWPY4KU",
        authDomain: "ak-events-2016.firebaseapp.com",
        databaseURL: "https://ak-events-2016-default-rtdb.firebaseio.com",
        projectId: "ak-events-2016",
        storageBucket: "ak-events-2016.firebasestorage.app",
        messagingSenderId: "78066764444",
        appId: "1:78066764444:web:742c79b7af7bc58632fb59"
    };

    // Initialize Firebase
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    const auth = firebase.auth();

    let currentUser = null;
    let currentPhone = null;
    let currentModule = "bw";
    let isQuizMode = false;
    let currentPopupIndex = null;
    const editModal = new bootstrap.Modal(document.getElementById('editModal'));

    // All your SAP topics
    const defaultData = {
        bw: { 
            title: "SAP BW", 
            items: [
                { name: "InfoObject", def: "Foundation of BW modeling. Can be characteristic (dimension) or key figure (measure).", list: ["Characteristic: Dimensions (customer, product, time)", "Key Figure: Measures (revenue, quantity, cost)"] },
                { name: "InfoCube", def: "Star schema database structure combining dimensions and facts.", list: ["Contains characteristics and key figures", "Basis for BEx queries", "Transactional or aggregated data"] },
                { name: "CompositeProvider", def: "Combines multiple InfoCubes or InfoObjects without physical joining.", list: ["Virtual object", "Combines heterogeneous sources", "Flexible for complex reporting"] }
            ]
        },
        datasphere: { 
            title: "SAP Datasphere", 
            items: [
                { name: "Table (Local Table)", def: "Physical table stored in SAP Datasphere holding data from imports or replication.", list: ["Store raw data from CSV imports", "Target for replication/data flows", "Can be marked as Relational Dataset, Dimension, or Fact"] },
                { name: "Remote Table", def: "Virtual reference to table in external source system without importing.", list: ["Real-time federation OR snapshot-based access", "Sources: SAP S/4HANA, BW/4HANA, Databases, Cloud", "Real-time slower; snapshots cache locally"] },
                { name: "Analytic Model (★ PRIMARY)", def: "Multi-dimensional analytical model for consumption in SAP Analytics Cloud.", list: ["Source: Fact Views", "Dimensions, Measures, Calculated Measures", "Variables for user input, Hierarchies, Associations", "Replaced Analytical Dataset - now legacy"] }
            ]
        },
        sac: { 
            title: "SAC", 
            items: [
                { name: "Story", def: "SAC visualization and dashboard combining multiple pages and visualizations.", list: ["Canvas for designing reports", "Multiple pages for different analyses", "Drill-down and interactive features"] }
            ]
        },
        hana: { 
            title: "HANA", 
            items: [
                { name: "Calculation View", def: "HANA modeling tool combining relational and analytical scenarios.", list: ["Join, Aggregation, Union operations", "Graphical and SQL variants", "Basis for many Datasphere views"] }
            ]
        },
        bo: { 
            title: "BO/WebI", 
            items: [
                { name: "Universe", def: "Semantic layer between database and reporting tools.", list: ["Business-friendly object names", "Predefined joins and calculations", "Access control and row-level security"] }
            ]
        }
    };

    let sapData = JSON.parse(JSON.stringify(defaultData));

    // Phone Login Handler
    function handlePhoneLogin() {
        const phone = document.getElementById('phoneInput').value.trim();
        const errorEl = document.getElementById('phoneError');
        const successEl = document.getElementById('phoneSuccess');

        errorEl.style.display = 'none';
        successEl.style.display = 'none';

        if (!phone) {
            errorEl.textContent = '❌ Please enter a phone number';
            errorEl.style.display = 'block';
            return;
        }

        if (!/^\d{10,}$/.test(phone)) {
            errorEl.textContent = '❌ Please enter a valid phone number (min 10 digits)';
            errorEl.style.display = 'block';
            return;
        }

        document.getElementById('loginBtn').disabled = true;
        document.getElementById('loginBtn').innerText = 'Connecting...';

        // Create anonymous account using phone as identifier
        auth.signInAnonymously()
            .then((result) => {
                currentUser = result.user;
                currentPhone = phone;

                // Save phone to database
                const ref = db.ref('sap_library/' + phone + '/info');
                ref.set({ lastLogin: new Date().toISOString() });

                // Load user's data
                loadDataFromCloud();

                // Show success
                successEl.textContent = '✅ Login successful! Loading your library...';
                successEl.style.display = 'block';

                setTimeout(() => {
                    document.getElementById('phoneScreen').classList.add('hidden');
                    document.getElementById('appScreen').classList.remove('hidden');
                    document.getElementById('userPhone').innerText = '📱 ' + phone;
                    init();
                }, 1500);
            })
            .catch((error) => {
                errorEl.textContent = '❌ Error: ' + error.message;
                errorEl.style.display = 'block';
                document.getElementById('loginBtn').disabled = false;
                document.getElementById('loginBtn').innerText = '🔓 Login / Sign Up';
            });
    }

    // Load Data from Cloud
    function loadDataFromCloud() {
        if (!currentPhone) return;

        const ref = db.ref('sap_library/' + currentPhone + '/topics');
        ref.on('value', snapshot => {
            const cloudData = snapshot.val();
            if (cloudData) {
                sapData = cloudData;
            }
            updateSyncStatus('✓ Synced');
        }, error => {
            updateSyncStatus('✗ Sync Error');
            console.error('Load error:', error);
        });
    }

    // Save to Cloud
    function saveToCloud() {
        if (!currentPhone) return;

        const ref = db.ref('sap_library/' + currentPhone + '/topics');
        ref.set(sapData)
            .then(() => {
                updateSyncStatus('✓ Saved');
                setTimeout(() => updateSyncStatus('✓ Synced'), 1000);
            })
            .catch(error => {
                updateSyncStatus('✗ Error');
                console.error('Save error:', error);
            });
    }

    function updateSyncStatus(status) {
        const el = document.getElementById('syncStatus');
        el.className = 'sync-status synced';
        el.innerHTML = status;
    }

    // Logout
    function handleLogout() {
        auth.signOut();
        currentUser = null;
        currentPhone = null;
        document.getElementById('appScreen').classList.add('hidden');
        document.getElementById('phoneScreen').classList.remove('hidden');
        document.getElementById('phoneInput').value = '';
        document.getElementById('phoneError').style.display = 'none';
        document.getElementById('phoneSuccess').style.display = 'none';
        document.getElementById('loginBtn').disabled = false;
        document.getElementById('loginBtn').innerText = '🔓 Login / Sign Up';
    }

    // App Functions
    function init() {
        const nav = document.getElementById('moduleNav');
        nav.innerHTML = "";
        Object.keys(sapData).forEach((key) => {
            const btn = document.createElement('button');
            btn.className = `module-btn ${key === currentModule ? 'active' : ''}`;
            btn.innerText = sapData[key].title;
            btn.onclick = () => { currentModule = key; init(); render(); };
            nav.appendChild(btn);
        });
        render();
    }

    function render() {
        const data = sapData[currentModule];
        let html = `<h2 class="text-warning mb-4">📖 ${data.title}</h2>`;
        data.items.forEach((item, idx) => {
            html += `
                <div class="tech-card" onclick="openTopicPopup(${idx})">
                    <button class="edit-btn" onclick="event.stopPropagation(); openEditModal(${idx})" title="Edit">✏️</button>
                    <h5 class="text-info">Q: ${item.name}</h5>
                    <p style="margin-bottom: 0; color: var(--text-dim); font-size: 0.9rem;">Click to view details →</p>
                </div>`;
        });
        document.getElementById('content-area').innerHTML = html;
    }

    function openTopicPopup(idx) {
        currentPopupIndex = idx;
        const item = sapData[currentModule].items[idx];
        
        document.getElementById('popupTitle').innerText = item.name;
        document.getElementById('popupDefinition').innerText = item.def;
        
        const listHtml = item.list && item.list.length > 0 
            ? item.list.map(point => `<li>${point}</li>`).join('')
            : '<li>No additional points</li>';
        
        document.getElementById('popupList').innerHTML = listHtml;
        document.getElementById('topicPopup').classList.add('show');
    }

    function closeTopicPopup() {
        document.getElementById('topicPopup').classList.remove('show');
        currentPopupIndex = null;
    }

    function editFromPopup() {
        closeTopicPopup();
        openEditModal(currentPopupIndex);
    }

    function openEditModal(idx) {
        document.getElementById('editIndex').value = idx === null ? "" : idx;
        if (idx !== null) {
            const item = sapData[currentModule].items[idx];
            document.getElementById('editName').value = item.name;
            document.getElementById('editDef').value = item.def;
            document.getElementById('editList').value = item.list ? item.list.join('\n') : "";
        } else {
            document.getElementById('editName').value = "";
            document.getElementById('editDef').value = "";
            document.getElementById('editList').value = "";
        }
        editModal.show();
    }

    function saveTopic() {
        const idx = document.getElementById('editIndex').value;
        const newItem = {
            name: document.getElementById('editName').value,
            def: document.getElementById('editDef').value,
            list: document.getElementById('editList').value.split('\n').filter(l => l.trim() !== "")
        };

        if (idx === "") sapData[currentModule].items.push(newItem);
        else sapData[currentModule].items[idx] = newItem;

        saveToCloud();
        editModal.hide();
        render();
    }

    function deleteTopic() {
        const idx = document.getElementById('editIndex').value;
        if (idx !== "" && confirm("Delete this topic?")) {
            sapData[currentModule].items.splice(idx, 1);
            saveToCloud();
            editModal.hide();
            render();
        }
    }

    function toggleQuizMode() { 
        isQuizMode = document.getElementById('quizSwitch').checked; 
        render(); 
    }

    function searchTech() {
        const term = document.getElementById('searchInput').value.toLowerCase();
        const cards = document.getElementsByClassName('tech-card');
        for (let card of cards) {
            const matches = card.innerText.toLowerCase().includes(term);
            card.style.display = matches ? "" : "none";
        }
    }

    // Close popup
    document.getElementById('topicPopup').addEventListener('click', function(event) {
        if (event.target === this) {
            closeTopicPopup();
        }
    });

    document.addEventListener('keydown', function(event) {
        if (event.key === 'Escape') {
            closeTopicPopup();
        }
    });
</script>
</body>
</html>
