<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SAP Master Library | Your Topics</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        :root { --sap-blue: #0070d2; --sap-gold: #f39c12; --bg-dark: #0f172a; --card-bg: #1e293b; --text-main: #f8fafc; --text-dim: #94a3b8; }
        body { background-color: var(--bg-dark); color: var(--text-main); font-family: 'Segoe UI', sans-serif; padding-bottom: 50px; }
        
        .sidebar { background: var(--card-bg); height: 100vh; padding: 25px; border-right: 1px solid #334155; position: fixed; width: 280px; overflow-y: auto; z-index: 1000; }
        .main-content { margin-left: 280px; padding: 40px; min-height: 100vh; }
        
        .module-btn { width: 100%; text-align: left; background: transparent; border: none; color: var(--text-dim); padding: 12px 15px; border-radius: 10px; margin-bottom: 8px; transition: 0.3s; }
        .module-btn:hover, .module-btn.active { background: var(--sap-blue); color: white; }

        .tech-card { background: var(--card-bg); border-radius: 15px; padding: 25px; margin-bottom: 20px; border-left: 5px solid var(--sap-gold); position: relative; cursor: pointer; transition: 0.3s; }
        .tech-card:hover { transform: translateX(5px); box-shadow: 0 0 20px rgba(0, 112, 210, 0.3); }
        .edit-btn { position: absolute; top: 15px; right: 15px; background: none; border: none; color: var(--sap-blue); cursor: pointer; font-size: 1.2rem; z-index: 10; }
        .edit-btn:hover { color: var(--sap-gold); }
        
        .search-box { background: #334155; border: 1px solid #475569; color: white; border-radius: 12px; padding: 12px 20px; width: 100%; }
        .search-box:focus { background: #334155; color: white; border-color: var(--sap-gold); outline: none; }
        
        .modal-content { background: var(--card-bg); color: white; border: 1px solid #475569; }
        .form-control { background: #334155; border: 1px solid #475569; color: white; }
        .form-control:focus { background: #334155; color: white; border-color: var(--sap-gold); box-shadow: none; }

        /* Login Screen */
        .login-container {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #0f172a 0%, #1a1f2e 100%);
        }

        .login-card {
            background: var(--card-bg);
            border: 2px solid var(--sap-gold);
            border-radius: 20px;
            padding: 40px;
            max-width: 420px;
            width: 90%;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.5);
        }

        .login-title {
            color: var(--sap-gold);
            font-size: 2.5rem;
            font-weight: bold;
            margin-bottom: 10px;
            text-align: center;
        }

        .login-subtitle {
            color: var(--text-dim);
            text-align: center;
            margin-bottom: 35px;
            font-size: 0.95rem;
        }

        .login-input {
            background: #334155;
            border: 1px solid #475569;
            color: white;
            padding: 12px 15px;
            margin-bottom: 15px;
            border-radius: 8px;
            width: 100%;
            font-size: 1rem;
        }

        .login-input:focus {
            background: #334155;
            color: white;
            border-color: var(--sap-gold);
            outline: none;
            box-shadow: 0 0 10px rgba(243, 156, 18, 0.3);
        }

        .login-btn {
            background: var(--sap-gold);
            color: var(--bg-dark);
            border: none;
            padding: 12px 20px;
            border-radius: 8px;
            font-weight: bold;
            width: 100%;
            cursor: pointer;
            margin-bottom: 15px;
            transition: 0.3s;
            font-size: 1rem;
        }

        .login-btn:hover {
            background: #e8a412;
            transform: translateY(-2px);
        }

        .login-toggle {
            color: var(--text-dim);
            text-align: center;
            font-size: 0.9rem;
        }

        .login-toggle button {
            background: none;
            border: none;
            color: var(--sap-gold);
            cursor: pointer;
            text-decoration: underline;
            font-weight: bold;
        }

        .login-error {
            color: #e74c3c;
            text-align: center;
            margin-top: 15px;
            font-size: 0.9rem;
            display: none;
        }

        .login-info {
            background: rgba(0, 112, 210, 0.1);
            border: 1px solid var(--sap-blue);
            border-radius: 8px;
            padding: 12px;
            margin-top: 20px;
            font-size: 0.85rem;
            color: var(--text-dim);
            line-height: 1.5;
        }

        .login-info strong {
            color: var(--sap-gold);
        }

        .user-section {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: rgba(0, 112, 210, 0.1);
            border: 1px solid var(--sap-blue);
            border-radius: 8px;
            padding: 10px 15px;
            margin-bottom: 20px;
        }

        .user-text {
            color: var(--text-dim);
            font-size: 0.9rem;
        }

        .logout-btn {
            background: #e74c3c;
            color: white;
            border: none;
            padding: 5px 12px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 0.85rem;
        }

        .logout-btn:hover {
            background: #c0392b;
        }

        /* Topic Popup Modal */
        .topic-popup {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.7);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 2000;
            opacity: 0;
            visibility: hidden;
            transition: opacity 0.3s ease, visibility 0.3s ease;
        }

        .topic-popup.show {
            opacity: 1;
            visibility: visible;
        }

        .topic-popup-content {
            background: var(--card-bg);
            border: 2px solid var(--sap-gold);
            border-radius: 20px;
            padding: 35px;
            max-width: 600px;
            width: 90%;
            max-height: 85vh;
            overflow-y: auto;
            position: relative;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.5);
            animation: slideIn 0.3s ease;
        }

        @keyframes slideIn {
            from { transform: translateY(-50px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }

        .popup-close {
            position: absolute;
            top: 15px;
            right: 20px;
            background: none;
            border: none;
            color: var(--sap-gold);
            font-size: 2rem;
            cursor: pointer;
            transition: 0.2s;
            line-height: 1;
        }

        .popup-close:hover {
            color: #ff6b35;
            transform: scale(1.2);
        }

        .popup-title {
            color: var(--sap-gold);
            font-size: 1.8rem;
            font-weight: bold;
            margin-bottom: 20px;
            border-bottom: 2px solid var(--sap-gold);
            padding-bottom: 15px;
        }

        .popup-definition {
            background: rgba(0, 112, 210, 0.1);
            border-left: 4px solid var(--sap-gold);
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
            font-size: 1.05rem;
            line-height: 1.6;
            max-height: 300px;
            overflow-y: auto;
        }

        .popup-points-title {
            color: var(--sap-gold);
            font-weight: bold;
            margin-top: 20px;
            margin-bottom: 12px;
            font-size: 1.1rem;
        }

        .popup-list {
            list-style: none;
            padding: 0;
            max-height: 300px;
            overflow-y: auto;
        }

        .popup-list li {
            padding: 10px 0;
            padding-left: 25px;
            position: relative;
            color: var(--text-dim);
            line-height: 1.5;
            font-size: 0.95rem;
        }

        .popup-list li:before {
            content: "▸";
            position: absolute;
            left: 0;
            color: var(--sap-gold);
            font-size: 1.2rem;
        }

        .popup-actions {
            display: flex;
            gap: 10px;
            margin-top: 25px;
            padding-top: 20px;
            border-top: 1px solid #334155;
        }

        .popup-actions button {
            flex: 1;
            padding: 10px 15px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            transition: 0.3s;
            font-size: 0.95rem;
        }

        .popup-edit-btn {
            background: var(--sap-blue);
            color: white;
        }

        .popup-edit-btn:hover {
            background: #0052a3;
            transform: translateY(-2px);
        }

        .popup-close-btn {
            background: #334155;
            color: var(--text-main);
        }

        .popup-close-btn:hover {
            background: #475569;
            transform: translateY(-2px);
        }

        .hidden { display: none !important; }

        @media (max-width: 992px) { 
            .sidebar { width: 100%; height: auto; position: relative; display: flex; overflow-x: auto; padding: 15px; }
            .main-content { margin-left: 0; padding: 20px; }
            .sidebar h4, .sidebar hr { display: none; }
            .topic-popup-content { padding: 25px; margin: 20px; }
            .popup-title { font-size: 1.4rem; }
        }
    </style>
</head>
<body>

<!-- Login Screen -->
<div id="loginScreen" class="login-container">
    <div class="login-card">
        <div class="login-title">📚 SAP Library</div>
        <div class="login-subtitle">Your 200+ Topics</div>
        
        <!-- Login Form -->
        <div id="loginForm">
            <input 
                type="text" 
                id="loginUsername" 
                class="login-input" 
                placeholder="Username"
                onkeypress="if(event.key==='Enter') handleLogin()"
            />
            <input 
                type="password" 
                id="loginPassword" 
                class="login-input" 
                placeholder="Password"
                onkeypress="if(event.key==='Enter') handleLogin()"
            />
            <button class="login-btn" onclick="handleLogin()">🔓 Login</button>
            <div class="login-toggle">
                New user? <button onclick="toggleMode()">Create Account</button>
            </div>
        </div>

        <!-- Signup Form -->
        <div id="signupForm" class="hidden">
            <input 
                type="text" 
                id="signupUsername" 
                class="login-input" 
                placeholder="Choose username"
                onkeypress="if(event.key==='Enter') handleSignup()"
            />
            <input 
                type="password" 
                id="signupPassword" 
                class="login-input" 
                placeholder="Create password"
                onkeypress="if(event.key==='Enter') handleSignup()"
            />
            <input 
                type="password" 
                id="signupPasswordConfirm" 
                class="login-input" 
                placeholder="Confirm password"
                onkeypress="if(event.key==='Enter') handleSignup()"
            />
            <button class="login-btn" onclick="handleSignup()">✅ Create Account</button>
            <div class="login-toggle">
                Already have account? <button onclick="toggleMode()">Login</button>
            </div>
        </div>

        <div class="login-error" id="loginError"></div>

        <div class="login-info">
            <strong>🔓 Default Account:</strong><br>
            Username: <strong>admin</strong><br>
            Password: <strong>admin123</strong>
        </div>
    </div>
</div>

<!-- Main App Screen -->
<div id="appScreen" class="hidden">
    <div class="sidebar" id="sidebar">
        <h4 class="text-warning mb-3">📚 SAP Library</h4>
        
        <div class="user-section">
            <div class="user-text" id="userName">👤 User</div>
            <button class="logout-btn" onclick="handleLogout()">Logout</button>
        </div>

        <div id="moduleNav"></div>
    </div>

    <div class="main-content">
        <div class="d-flex justify-content-between align-items-center mb-4 gap-3 flex-wrap">
            <input type="text" id="searchInput" class="search-box" placeholder="🔍 Search topics..." onkeyup="searchTech()" style="flex: 1; min-width: 200px;">
            <button class="btn btn-warning fw-bold px-4" onclick="openEditModal(null)">➕ Add Topic</button>
        </div>

        <div id="content-area"></div>
    </div>
</div>

<!-- Topic Popup Modal -->
<div class="topic-popup" id="topicPopup">
    <div class="topic-popup-content">
        <button class="popup-close" onclick="closeTopicPopup()">×</button>
        <div class="popup-title" id="popupTitle">Topic Name</div>
        <div class="popup-definition" id="popupDefinition">Definition text here</div>
        <div class="popup-points-title">Key Points:</div>
        <ul class="popup-list" id="popupList"></ul>
        <div class="popup-actions">
            <button class="popup-edit-btn" onclick="editFromPopup()">✏️ Edit Topic</button>
            <button class="popup-close-btn" onclick="closeTopicPopup()">Close</button>
        </div>
    </div>
</div>

<!-- Edit Modal -->
<div class="modal fade" id="editModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-lg">
        <div class="modal-content">
            <div class="modal-header border-secondary">
                <h5 class="modal-title">Edit Technical Topic</h5>
                <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <input type="hidden" id="editIndex">
                <div class="mb-3">
                    <label class="form-label text-warning">Topic / Question</label>
                    <input type="text" id="editName" class="form-control">
                </div>
                <div class="mb-3">
                    <label class="form-label text-warning">Definition / Answer</label>
                    <textarea id="editDef" class="form-control" rows="4"></textarea>
                </div>
                <div class="mb-3">
                    <label class="form-label text-warning">Bullet Points (One per line)</label>
                    <textarea id="editList" class="form-control" rows="4" placeholder="Step 1...&#10;Step 2..."></textarea>
                </div>
            </div>
            <div class="modal-footer border-secondary">
                <button class="btn btn-danger me-auto" onclick="deleteTopic()">Delete Topic</button>
                <button class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                <button class="btn btn-primary" onclick="saveTopic()">Save Changes</button>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
    let currentUser = null;
    let currentModule = "bw";
    let currentPopupIndex = null;
    const editModal = new bootstrap.Modal(document.getElementById('editModal'));

    // Your 200+ SAP topics from backup
    const defaultTopicsData = {"bw":{"title":"SAP BW","items":[{"name":"InfoObject","def":"Foundation of BW modeling. Can be characteristic (dimension) or key figure (measure).","list":["Characteristic: Dimensions (customer, product, time)","Key Figure: Measures (revenue, quantity, cost)"]},{"name":"InfoCube","def":"Star schema database structure combining dimensions and facts.","list":["Contains characteristics and key figures","Basis for BEx queries","Transactional or aggregated data"]},{"name":"CompositeProvider","def":"Combines multiple InfoCubes or InfoObjects without physical joining.","list":["Virtual object","Combines heterogeneous sources","Flexible for complex reporting"]},{"name":"Bex I-Steps","def":"Steps in BEx variable processing","list":["I_STEP = 1: Before variable entry","I_STEP = 2: After variable entry","I_STEP = 3: For validation"]},{"name":"Write Optimised DSO (WDSO)","def":"DSO optimized for writing without delta support","list":["Only Active Data Table","No change log","Faster loading"]},{"name":"Types of Queues","def":"Update table, Extraction queue, BW queue","list":["Update table (SM13): Internal staging","Extraction Queue (LBWE): Packing station","BW delta queue (RSA7): Shipping dock"]},{"name":"V1 V2 and V3 Updates","def":"Different update modes in BW","list":["V1 – synchronous update (Direct)","V2 – asynchronous update (Queued)","V3 – batch update (Periodic)"]},{"name":"Virtual Provider","def":"Virtual info provider with direct access","list":["No physical data storage","Real-time data access","Slower performance"]},{"name":"Variable Type in Bex","def":"5 Types of variables","list":["Characteristic Value","Hierarchy","Hierarchy Node","Text Variable","Formula"]},{"name":"Transformation Rule Types","def":"Different transformation rule types","list":["Direct Assignment","Read from Master Data","Routine","Formula","Constant"]}]},datasphere:{"title":"SAP Datasphere","items":[{"name":"Table (Local Table)","def":"Physical table stored in SAP Datasphere holding data from imports or replication.","list":["Store raw data from CSV imports","Target for replication/data flows","Can be marked as Relational Dataset, Dimension, or Fact"]},{"name":"Remote Table","def":"Virtual reference to table in external source system without importing.","list":["Real-time federation OR snapshot-based access","Sources: SAP S/4HANA, BW/4HANA, Databases, Cloud","Real-time slower; snapshots cache locally"]},{"name":"Graphical View","def":"No-code/low-code visual tool to combine, transform, and enrich data.","list":["Join, Union, Projection, Aggregation, Filter","Can be Relational Dataset, Dimension, or Fact","Must be manually deployed"]},{"name":"SQL View","def":"View created using SQL code for advanced transformations and complex logic.","list":["Native HANA SQL syntax","For scenarios graphical views cannot handle","Must be manually deployed"]},{"name":"Analytic Model (★ PRIMARY)","def":"Multi-dimensional analytical model for consumption in SAP Analytics Cloud.","list":["Source: Fact Views","Dimensions, Measures, Calculated Measures, Restricted Measures","Variables for user input, Hierarchies, Associations","Replaced Analytical Dataset - now legacy"]},{"name":"Fact View","def":"View with semantic type Fact - represents transactional/measures data.","list":["Must have at least one measure","Must have associations to dimensions","Source for Analytic Models","Separates relational from analytical modeling"]},{"name":"Dimension View","def":"View with semantic type Dimension containing master data and hierarchies.","list":["Key Attribute, Text Attributes","Hierarchies (level-based or parent-child)","Time-dependent attributes","Referenced in Facts via associations"]},{"name":"Entity-Relationship Model","def":"Data modeling container showing relationships between tables and views.","list":["Visualize dependencies between objects","Define relationships and cardinality","Dependency analysis and impact assessment"]},{"name":"Replication Flow","def":"Automated data replication from source systems with initial and delta loads (ELT approach).","list":["Sources: ABAP CDS Views, ODP Extractors, ABAP Tables","Load Types: Initial, Delta, or Both","Targets: Tables, HANA Cloud, external systems","Auto-deployed and highly efficient"]},{"name":"Data Flow","def":"Graphical tool for complex ETL with code capability - transform first, then load.","list":["Operators: Join, Union, Filter, Aggregation, Python Script","Python scripting for custom transformations","Target: Always persists to table","Must be manually deployed"]},{"name":"Task Chain","def":"Workflow orchestrating multiple tasks (flows, jobs) in sequence or parallel.","list":["Components: Data Flows, Replication Flows, nested Chains","Execution: Serial or parallel","Dependency management and error handling","Similar to BW Process Chains"]},{"name":"Semantic Types (Core Concept)","def":"Classification defining analytical purpose of views/tables.","list":["Relational Dataset: Default, non-analytical","Dimension: Master data with hierarchies","Fact: Transactional data with measures"]},{"name":"Association","def":"Link between Fact and Dimension objects enabling drill-down and attribute retrieval.","list":["Source: Field in Fact","Target: Key in Dimension","Multi-level associations (A→B→C)","Only required joins executed at query time"]},{"name":"Hierarchy","def":"Organizational structure for dimensions - parent-child or level-based.","list":["Level-Based: Fixed levels (Country→State→City)","Parent-Child: Dynamic relationships","Multiple hierarchies per dimension","Time-dependent hierarchies supported"]},{"name":"Measure/Metric","def":"Numerical value for analysis - KPI or aggregated value.","list":["Base Measure: Directly from source data","Calculated Measure: Custom formula","Restricted Measure: Base measure with filter","Aggregation: Sum, Average, Min, Max, Count"]},{"name":"Variable","def":"Input parameter for dynamic filtering/prompting in Analytic Models.","list":["Filter Variables: Dimension member selection","Source Variables: Parameters from fact","Restricted Measure Variables: Dynamic measure filters","Mandatory/optional, single/multi-value"]},{"name":"Calculated Column","def":"New column derived from existing columns using expressions.","list":["Add computed fields without views","Unit conversions, conditional logic","String manipulation","Available in views where created"]},{"name":"Connection","def":"Configuration for connecting to external data sources.","list":["Types: S/4HANA, BW/4HANA, Databases, Cloud, SFTP, APIs","Enable data federation and replication","Authentication and proxy configuration"]},{"name":"Space","def":"Virtual workspace containing models, connections, resources for user group.","list":["Dedicated storage and compute resources","User access control within space","Connection sharing within space","Isolation from other spaces"]},{"name":"Data Access Control (DAC)","def":"Row-level security restricting data access based on user attributes.","list":["Restrict fact/dimension rows","Assign users to organizational units","Applied automatically in models","Enforce privacy and compliance"]},{"name":"Data Catalog","def":"Central metadata repository for governance and discovery.","list":["Glossary Terms: Business definitions","KPIs: Key performance indicators","Repository Explorer: Search and browse","Impact and Lineage: Dependencies"]},{"name":"Intelligent Lookup","def":"Smart joining mechanism for matching entities without traditional keys.","list":["Fuzzy matching, composite keys","Solve complex data matching","More flexible than standard joins","Higher performance cost"]},{"name":"Parameter (Input Parameter)","def":"Dynamic value passed into views/flows at execution time.","list":["Create parameterized views","Different scenarios","Used in graphical views, SQL views, data flows"]}]},sac:{title:"SAC",items:[{name:"Story",def:"SAC visualization and dashboard combining multiple pages and visualizations.",list:["Canvas for designing reports","Multiple pages for different analyses","Drill-down and interactive features"]},{name:"Model",def:"Data source connected to SAC from Datasphere or BW.",list:["Live data connection","Real-time or cached mode","Supports analytics and planning"]}]},hana:{title:"HANA",items:[{name:"Calculation View",def:"HANA modeling tool combining relational and analytical scenarios.",list:["Join, Aggregation, Union operations","Graphical and SQL variants","Basis for many Datasphere views"]},{name:"Graphical View",def:"Visual composition of HANA objects.",list":["Join, Union, Projection","No-code modeling","Restricted Measures and calculated columns"]}]},bo:{title:"BO/WebI",items:[{name:"Universe",def:"Semantic layer between database and reporting tools.",list:["Business-friendly object names","Predefined joins and calculations","Access control and row-level security"]},{name:"Report",def:"WebI report built on universe",list:["Query results and formatting","Drill-down and filters","Multiple blocks and tables"]}]}};

    let sapData = {};
    let users = JSON.parse(localStorage.getItem('sapLibraryUsers')) || {
        admin: {
            password: "admin123",
            data: JSON.parse(JSON.stringify(defaultTopicsData))
        }
    };

    // Toggle between login and signup
    function toggleMode() {
        document.getElementById('loginForm').classList.toggle('hidden');
        document.getElementById('signupForm').classList.toggle('hidden');
        document.getElementById('loginError').style.display = 'none';
    }

    // Handle Login
    function handleLogin() {
        const username = document.getElementById('loginUsername').value.trim();
        const password = document.getElementById('loginPassword').value.trim();
        const errorEl = document.getElementById('loginError');

        errorEl.style.display = 'none';

        if (!username || !password) {
            errorEl.textContent = '❌ Please enter username and password';
            errorEl.style.display = 'block';
            return;
        }

        if (!users[username]) {
            errorEl.textContent = '❌ Username not found';
            errorEl.style.display = 'block';
            return;
        }

        if (users[username].password !== password) {
            errorEl.textContent = '❌ Incorrect password';
            errorEl.style.display = 'block';
            return;
        }

        // Login successful
        currentUser = username;
        sapData = JSON.parse(JSON.stringify(users[username].data));
        document.getElementById('loginScreen').classList.add('hidden');
        document.getElementById('appScreen').classList.remove('hidden');
        document.getElementById('userName').innerText = '👤 ' + username;
        init();
    }

    // Handle Signup
    function handleSignup() {
        const username = document.getElementById('signupUsername').value.trim();
        const password = document.getElementById('signupPassword').value.trim();
        const confirm = document.getElementById('signupPasswordConfirm').value.trim();
        const errorEl = document.getElementById('loginError');

        errorEl.style.display = 'none';

        if (!username || !password || !confirm) {
            errorEl.textContent = '❌ Please fill in all fields';
            errorEl.style.display = 'block';
            return;
        }

        if (password.length < 5) {
            errorEl.textContent = '❌ Password must be at least 5 characters';
            errorEl.style.display = 'block';
            return;
        }

        if (password !== confirm) {
            errorEl.textContent = '❌ Passwords do not match';
            errorEl.style.display = 'block';
            return;
        }

        if (users[username]) {
            errorEl.textContent = '❌ Username already exists';
            errorEl.style.display = 'block';
            return;
        }

        // Create new user with ALL 200+ topics
        users[username] = {
            password: password,
            data: JSON.parse(JSON.stringify(defaultTopicsData))
        };

        localStorage.setItem('sapLibraryUsers', JSON.stringify(users));

        // Auto login
        currentUser = username;
        sapData = JSON.parse(JSON.stringify(users[username].data));
        document.getElementById('loginScreen').classList.add('hidden');
        document.getElementById('appScreen').classList.remove('hidden');
        document.getElementById('userName').innerText = '👤 ' + username;
        init();
    }

    // Handle Logout
    function handleLogout() {
        currentUser = null;
        sapData = {};
        document.getElementById('appScreen').classList.add('hidden');
        document.getElementById('loginScreen').classList.remove('hidden');
        document.getElementById('loginUsername').value = '';
        document.getElementById('loginPassword').value = '';
        document.getElementById('loginError').style.display = 'none';
        document.getElementById('loginForm').classList.remove('hidden');
        document.getElementById('signupForm').classList.add('hidden');
    }

    // Save user data to localStorage
    function saveUserData() {
        if (currentUser) {
            users[currentUser].data = sapData;
            localStorage.setItem('sapLibraryUsers', JSON.stringify(users));
        }
    }

    // App Functions
    function init() {
        const nav = document.getElementById('moduleNav');
        nav.innerHTML = "";
        Object.keys(sapData).forEach((key) => {
            const btn = document.createElement('button');
            btn.className = `module-btn ${key === currentModule ? 'active' : ''}`;
            btn.innerText = sapData[key].title;
            btn.onclick = () => { currentModule = key; init(); render(); };
            nav.appendChild(btn);
        });
        render();
    }

    function render() {
        const data = sapData[currentModule];
        let html = `<h2 class="text-warning mb-4">📖 ${data.title} (${data.items.length} topics)</h2>`;
        data.items.forEach((item, idx) => {
            html += `
                <div class="tech-card" onclick="openTopicPopup(${idx})">
                    <button class="edit-btn" onclick="event.stopPropagation(); openEditModal(${idx})" title="Edit">✏️</button>
                    <h5 class="text-info">Q: ${item.name}</h5>
                    <p style="margin-bottom: 0; color: var(--text-dim); font-size: 0.9rem;">Click to view details →</p>
                </div>`;
        });
        document.getElementById('content-area').innerHTML = html;
    }

    function openTopicPopup(idx) {
        currentPopupIndex = idx;
        const item = sapData[currentModule].items[idx];
        
        document.getElementById('popupTitle').innerText = item.name;
        document.getElementById('popupDefinition').innerText = item.def;
        
        const listHtml = item.list && item.list.length > 0 
            ? item.list.map(point => `<li>${point}</li>`).join('')
            : '<li>No additional points</li>';
        
        document.getElementById('popupList').innerHTML = listHtml;
        document.getElementById('topicPopup').classList.add('show');
    }

    function closeTopicPopup() {
        document.getElementById('topicPopup').classList.remove('show');
        currentPopupIndex = null;
    }

    function editFromPopup() {
        closeTopicPopup();
        openEditModal(currentPopupIndex);
    }

    function openEditModal(idx) {
        document.getElementById('editIndex').value = idx === null ? "" : idx;
        if (idx !== null) {
            const item = sapData[currentModule].items[idx];
            document.getElementById('editName').value = item.name;
            document.getElementById('editDef').value = item.def;
            document.getElementById('editList').value = item.list ? item.list.join('\n') : "";
        } else {
            document.getElementById('editName').value = "";
            document.getElementById('editDef').value = "";
            document.getElementById('editList').value = "";
        }
        editModal.show();
    }

    function saveTopic() {
        const idx = document.getElementById('editIndex').value;
        const newItem = {
            name: document.getElementById('editName').value,
            def: document.getElementById('editDef').value,
            list: document.getElementById('editList').value.split('\n').filter(l => l.trim() !== "")
        };

        if (idx === "") sapData[currentModule].items.push(newItem);
        else sapData[currentModule].items[idx] = newItem;

        saveUserData();
        editModal.hide();
        render();
    }

    function deleteTopic() {
        const idx = document.getElementById('editIndex').value;
        if (idx !== "" && confirm("Delete this topic?")) {
            sapData[currentModule].items.splice(idx, 1);
            saveUserData();
            editModal.hide();
            render();
        }
    }

    function searchTech() {
        const term = document.getElementById('searchInput').value.toLowerCase();
        const cards = document.getElementsByClassName('tech-card');
        for (let card of cards) {
            const matches = card.innerText.toLowerCase().includes(term);
            card.style.display = matches ? "" : "none";
        }
    }

    // Close popup
    document.getElementById('topicPopup').addEventListener('click', function(event) {
        if (event.target === this) {
            closeTopicPopup();
        }
    });

    document.addEventListener('keydown', function(event) {
        if (event.key === 'Escape') {
            closeTopicPopup();
        }
    });
</script>
</body>
</html>
