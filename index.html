<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SAP Knowledge Vault</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

body{
background:#0f172a;
color:white;
font-family:Segoe UI;
}

.sidebar{
background:#1e293b;
padding:20px;
width:260px;
height:100vh;
position:fixed;
left:0;
top:0;
overflow-y:auto;
}

.main-content{
margin-left:260px;
padding:30px;
}

.module-btn{
width:100%;
background:none;
border:none;
color:#94a3b8;
text-align:left;
padding:12px;
border-radius:8px;
margin-bottom:6px;
}

.module-btn:hover,
.module-btn.active{
background:#0070d2;
color:white;
}

.tech-card{
background:#1e293b;
padding:20px;
border-left:4px solid orange;
border-radius:10px;
margin-bottom:15px;
cursor:pointer;
transition:0.3s;
}

.tech-card:hover{
transform:translateX(5px);
box-shadow:0 0 10px rgba(0,112,210,0.5);
}

.popup{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.7);
display:none;
align-items:center;
justify-content:center;
z-index:2000;
}

.popup-content{
background:#1e293b;
padding:30px;
border-radius:12px;
max-width:500px;
width:90%;
}

@media(max-width:768px){

.sidebar{
position:relative;
width:100%;
height:auto;
}

.main-content{
margin-left:0;
padding:20px;
}

}

</style>
</head>

<body>

<div class="sidebar">

<h4 class="mb-4">📚 SAP Library</h4>

<div id="moduleNav"></div>

</div>

<div class="main-content">

<div class="d-flex gap-3 mb-4 flex-wrap">

<input id="searchInput" class="form-control" placeholder="Search topic..." onkeyup="searchTech()" style="max-width:400px">

<button class="btn btn-warning" onclick="openEditModal(null)">Add Topic</button>

</div>

<div id="content-area"></div>

</div>

<div class="popup" id="topicPopup">

<div class="popup-content">

<h4 id="popupTitle"></h4>

<p id="popupDef"></p>

<ul id="popupList"></ul>

<button class="btn btn-secondary mt-3" onclick="closePopup()">Close</button>

</div>

</div>


<div class="modal fade" id="editModal">

<div class="modal-dialog">

<div class="modal-content bg-dark text-white">

<div class="modal-header">

<h5>Edit Topic</h5>

<button class="btn-close btn-close-white" data-bs-dismiss="modal"></button>

</div>

<div class="modal-body">

<input type="hidden" id="editIndex">

<div class="mb-3">

<label>Topic</label>

<input id="editName" class="form-control">

</div>

<div class="mb-3">

<label>Definition</label>

<textarea id="editDef" class="form-control"></textarea>

</div>

<div class="mb-3">

<label>Points (one per line)</label>

<textarea id="editList" class="form-control"></textarea>

</div>

</div>

<div class="modal-footer">

<button class="btn btn-danger me-auto" onclick="deleteTopic()">Delete</button>

<button class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>

<button class="btn btn-primary" onclick="saveTopic()">Save</button>

</div>

</div>

</div>

</div>


<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>


<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import {
getFirestore,
collection,
addDoc,
updateDoc,
deleteDoc,
doc,
onSnapshot
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";


const firebaseConfig = {

apiKey: "AIzaSyB9_sBL83sKvIaOvAE8msHw1WQ80QwhxfU",

authDomain: "ak-chit-funds.firebaseapp.com",

projectId: "ak-chit-funds",

storageBucket: "ak-chit-funds.firebasestorage.app",

messagingSenderId: "297195194526",

appId: "1:297195194526:web:d446e1bc4f92918611938f"

};


const app = initializeApp(firebaseConfig);

const db = getFirestore(app);


let currentModule="bw";

let sapData={};

let editModal;


const MODULES={

bw:"SAP BW",

datasphere:"SAP Datasphere",

sac:"SAP SAC",

hana:"SAP HANA",

bo:"SAP BO/WebI"

};


window.addEventListener("load",()=>{

editModal=new bootstrap.Modal(document.getElementById("editModal"));

initModules();

listenTopics();

});


function initModules(){

const nav=document.getElementById("moduleNav");

nav.innerHTML="";

Object.keys(MODULES).forEach(k=>{

const btn=document.createElement("button");

btn.className="module-btn "+(k===currentModule?"active":"");

btn.innerText=MODULES[k];

btn.onclick=()=>{

currentModule=k;

initModules();

render();

};

nav.appendChild(btn);

});

}


function listenTopics(){

onSnapshot(collection(db,"sap_topics"),(snapshot)=>{

sapData={};

Object.keys(MODULES).forEach(m=>{

sapData[m]={title:MODULES[m],items:[]};

});

snapshot.forEach(d=>{

const data=d.data();

sapData[data.module].items.push({

id:d.id,

name:data.name,

def:data.def,

list:data.list

});

});

render();

});

}


function render(){

const data=sapData[currentModule];

if(!data)return;

let html=`<h3 class="mb-4">${data.title}</h3>`;

data.items.forEach((item,i)=>{

html+=`

<div class="tech-card" onclick="openPopup(${i})">

<h5>${item.name}</h5>

</div>

`;

});

document.getElementById("content-area").innerHTML=html;

}


window.openPopup=function(i){

const t=sapData[currentModule].items[i];

popupTitle.innerText=t.name;

popupDef.innerText=t.def;

popupList.innerHTML=t.list.map(x=>`<li>${x}</li>`).join("");

topicPopup.style.display="flex";

}


window.closePopup=function(){

topicPopup.style.display="none";

}


window.openEditModal=function(i){

editIndex.value=i??"";

if(i!=null){

const t=sapData[currentModule].items[i];

editName.value=t.name;

editDef.value=t.def;

editList.value=t.list.join("\n");

}else{

editName.value="";

editDef.value="";

editList.value="";

}

editModal.show();

}


window.saveTopic=async function(){

const idx=editIndex.value;

const item={

module:currentModule,

name:editName.value,

def:editDef.value,

list:editList.value.split("\n")

};

if(idx===""){

await addDoc(collection(db,"sap_topics"),item);

}else{

const id=sapData[currentModule].items[idx].id;

await updateDoc(doc(db,"sap_topics",id),item);

}

editModal.hide();

}


window.deleteTopic=async function(){

const idx=editIndex.value;

if(idx==="")return;

const id=sapData[currentModule].items[idx].id;

await deleteDoc(doc(db,"sap_topics",id));

editModal.hide();

}


window.searchTech=function(){

const term=searchInput.value.toLowerCase();

document.querySelectorAll(".tech-card").forEach(c=>{

c.style.display=c.innerText.toLowerCase().includes(term)?"":"none";

});

}

</script>

</body>
</html>
