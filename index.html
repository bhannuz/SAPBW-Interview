<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SAP Master Library | Live Editor</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        :root { --sap-blue: #0070d2; --sap-gold: #f39c12; --bg-dark: #0f172a; --card-bg: #1e293b; --text-main: #f8fafc; --text-dim: #94a3b8; }
        body { background-color: var(--bg-dark); color: var(--text-main); font-family: 'Segoe UI', sans-serif; padding-bottom: 50px; }
        
        .sidebar { background: var(--card-bg); height: 100vh; padding: 25px; border-right: 1px solid #334155; position: fixed; width: 280px; overflow-y: auto; z-index: 1000; }
        .main-content { margin-left: 280px; padding: 40px; min-height: 100vh; }
        
        .module-btn { width: 100%; text-align: left; background: transparent; border: none; color: var(--text-dim); padding: 12px 15px; border-radius: 10px; margin-bottom: 8px; transition: 0.3s; }
        .module-btn:hover, .module-btn.active { background: var(--sap-blue); color: white; }

        .tech-card { background: var(--card-bg); border-radius: 15px; padding: 25px; margin-bottom: 20px; border-left: 5px solid var(--sap-gold); position: relative; }
        .edit-btn { position: absolute; top: 15px; right: 15px; background: none; border: none; color: var(--sap-blue); cursor: pointer; font-size: 1.2rem; }
        
        .hidden-answer { filter: blur(8px); opacity: 0.1; }
        .search-box { background: #334155; border: 1px solid #475569; color: white; border-radius: 12px; padding: 12px 20px; width: 100%; }
        
        .modal-content { background: var(--card-bg); color: white; border: 1px solid #475569; }
        .form-control { background: #334155; border: 1px solid #475569; color: white; }
        .form-control:focus { background: #334155; color: white; border-color: var(--sap-gold); }

        @media (max-width: 992px) { 
            .sidebar { width: 100%; height: auto; position: relative; display: flex; overflow-x: auto; padding: 15px; }
            .main-content { margin-left: 0; padding: 20px; }
            .sidebar h4, .sidebar hr { display: none; }
        }
    </style>
</head>
<body>

<div class="sidebar" id="sidebar">
    <h4 class="text-warning mb-4">SAP Library ✏️</h4>
    <div id="moduleNav"></div>
</div>

<div class="main-content">
    <div class="d-flex justify-content-between align-items-center mb-4 gap-3">
        <input type="text" id="searchInput" class="search-box" placeholder="🔍 Search topics..." onkeyup="searchTech()">
        <button class="btn btn-warning fw-bold px-4" onclick="openEditModal(null)">➕ Add Topic</button>
    </div>

    <div class="form-check form-switch mb-4">
        <input class="form-check-input" type="checkbox" id="quizSwitch" onchange="toggleQuizMode()">
        <label class="form-check-label small fw-bold" for="quizSwitch">QUIZ MODE (Click cards to reveal)</label>
    </div>

    <div id="content-area"></div>
</div>

<div class="modal fade" id="editModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-lg">
        <div class="modal-content">
            <div class="modal-header border-secondary">
                <h5 class="modal-title">Edit Technical Topic</h5>
                <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <input type="hidden" id="editIndex">
                <div class="mb-3">
                    <label class="form-label text-warning">Topic / Question</label>
                    <input type="text" id="editName" class="form-control">
                </div>
                <div class="mb-3">
                    <label class="form-label text-warning">Definition / Answer</label>
                    <textarea id="editDef" class="form-control" rows="4"></textarea>
                </div>
                <div class="mb-3">
                    <label class="form-label text-warning">Bullet Points (One per line)</label>
                    <textarea id="editList" class="form-control" rows="4" placeholder="Step 1...&#10;Step 2..."></textarea>
                </div>
            </div>
            <div class="modal-footer border-secondary">
                <button class="btn btn-danger me-auto" onclick="deleteTopic()">Delete Topic</button>
                <button class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                <button class="btn btn-primary" onclick="saveTopic()">Save Changes</button>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
    // Initial Data
    const defaultData = {
        bw: { title: "SAP BW", items: [{ name: "InfoObject", def: "Foundation of BW.", list: ["Char","Key Figure"] }] },
        datasphere: { title: "Datasphere", items: [{ name: "Spaces", def: "Work environments." }] },
        sac: { title: "SAC", items: [{ name: "Stories", def: "Visualizations." }] },
        hana: { title: "HANA", items: [{ name: "Views", def: "Modeling tool." }] },
        bo: { title: "BO/WebI", items: [{ name: "Universe", def: "Semantic layer." }] }
    };

    let sapData = JSON.parse(localStorage.getItem('sapData')) || defaultData;
    let currentModule = "bw";
    let isQuizMode = false;
    const editModal = new bootstrap.Modal(document.getElementById('editModal'));

    function init() {
        const nav = document.getElementById('moduleNav');
        nav.innerHTML = "";
        Object.keys(sapData).forEach((key) => {
            const btn = document.createElement('button');
            btn.className = `module-btn ${key === currentModule ? 'active' : ''}`;
            btn.innerText = sapData[key].title;
            btn.onclick = () => { currentModule = key; init(); render(); };
            nav.appendChild(btn);
        });
        render();
    }

    function render() {
        const data = sapData[currentModule];
        let html = `<h2 class="text-warning mb-4">${data.title}</h2>`;
        data.items.forEach((item, idx) => {
            html += `
                <div class="tech-card" onclick="revealAnswer(this)">
                    <button class="edit-btn" onclick="event.stopPropagation(); openEditModal(${idx})">✏️</button>
                    <h5 class="text-info">Q: ${item.name}</h5>
                    <div class="answer-area ${isQuizMode ? 'hidden-answer' : ''}">
                        <p>${item.def}</p>
                        ${item.list ? `<ul>${item.list.map(l => `<li>${l}</li>`).join('')}</ul>` : ''}
                    </div>
                </div>`;
        });
        document.getElementById('content-area').innerHTML = html;
    }

    function openEditModal(idx) {
        document.getElementById('editIndex').value = idx === null ? "" : idx;
        if (idx !== null) {
            const item = sapData[currentModule].items[idx];
            document.getElementById('editName').value = item.name;
            document.getElementById('editDef').value = item.def;
            document.getElementById('editList').value = item.list ? item.list.join('\n') : "";
        } else {
            document.getElementById('editName').value = "";
            document.getElementById('editDef').value = "";
            document.getElementById('editList').value = "";
        }
        editModal.show();
    }

    function saveTopic() {
        const idx = document.getElementById('editIndex').value;
        const newItem = {
            name: document.getElementById('editName').value,
            def: document.getElementById('editDef').value,
            list: document.getElementById('editList').value.split('\n').filter(l => l.trim() !== "")
        };

        if (idx === "") sapData[currentModule].items.push(newItem);
        else sapData[currentModule].items[idx] = newItem;

        localStorage.setItem('sapData', JSON.stringify(sapData));
        editModal.hide();
        render();
    }

    function deleteTopic() {
        const idx = document.getElementById('editIndex').value;
        if (idx !== "" && confirm("Delete this topic?")) {
            sapData[currentModule].items.splice(idx, 1);
            localStorage.setItem('sapData', JSON.stringify(sapData));
            editModal.hide();
            render();
        }
    }

    function toggleQuizMode() { isQuizMode = document.getElementById('quizSwitch').checked; render(); }
    function revealAnswer(card) { if(isQuizMode) card.querySelector('.answer-area').classList.toggle('hidden-answer'); }
    function searchTech() {
        const term = document.getElementById('searchInput').value.toLowerCase();
        const cards = document.getElementsByClassName('tech-card');
        for (let card of cards) card.style.display = card.innerText.toLowerCase().includes(term) ? "" : "none";
    }

    init();
</script>
</body>
</html>
