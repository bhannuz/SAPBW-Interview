<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SAP Master Library | Cloud Sync with Your Topics</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-database.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-auth.js"></script>
    <style>
        :root { --sap-blue: #0070d2; --sap-gold: #f39c12; --bg-dark: #0f172a; --card-bg: #1e293b; --text-main: #f8fafc; --text-dim: #94a3b8; }
        body { background-color: var(--bg-dark); color: var(--text-main); font-family: 'Segoe UI', sans-serif; padding-bottom: 50px; }
        
        .sidebar { background: var(--card-bg); height: 100vh; padding: 25px; border-right: 1px solid #334155; position: fixed; width: 280px; overflow-y: auto; z-index: 1000; }
        .main-content { margin-left: 280px; padding: 40px; min-height: 100vh; }
        
        .module-btn { width: 100%; text-align: left; background: transparent; border: none; color: var(--text-dim); padding: 12px 15px; border-radius: 10px; margin-bottom: 8px; transition: 0.3s; }
        .module-btn:hover, .module-btn.active { background: var(--sap-blue); color: white; }

        .tech-card { background: var(--card-bg); border-radius: 15px; padding: 25px; margin-bottom: 20px; border-left: 5px solid var(--sap-gold); position: relative; cursor: pointer; transition: 0.3s; }
        .tech-card:hover { transform: translateX(5px); box-shadow: 0 0 20px rgba(0, 112, 210, 0.3); }
        .edit-btn { position: absolute; top: 15px; right: 15px; background: none; border: none; color: var(--sap-blue); cursor: pointer; font-size: 1.2rem; z-index: 10; }
        .edit-btn:hover { color: var(--sap-gold); }
        
        .search-box { background: #334155; border: 1px solid #475569; color: white; border-radius: 12px; padding: 12px 20px; width: 100%; }
        .search-box:focus { background: #334155; color: white; border-color: var(--sap-gold); outline: none; }
        
        .modal-content { background: var(--card-bg); color: white; border: 1px solid #475569; }
        .form-control { background: #334155; border: 1px solid #475569; color: white; }
        .form-control:focus { background: #334155; color: white; border-color: var(--sap-gold); box-shadow: none; }

        /* Auth Screen */
        .auth-container {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #0f172a 0%, #1a1f2e 100%);
        }

        .auth-card {
            background: var(--card-bg);
            border: 2px solid var(--sap-gold);
            border-radius: 20px;
            padding: 40px;
            max-width: 450px;
            width: 90%;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.5);
        }

        .auth-title {
            color: var(--sap-gold);
            font-size: 2rem;
            font-weight: bold;
            margin-bottom: 10px;
            text-align: center;
        }

        .auth-subtitle {
            color: var(--text-dim);
            text-align: center;
            margin-bottom: 30px;
            font-size: 0.95rem;
        }

        .auth-input {
            background: #334155;
            border: 1px solid #475569;
            color: white;
            padding: 12px 15px;
            margin-bottom: 15px;
            border-radius: 8px;
            width: 100%;
        }

        .auth-input:focus {
            background: #334155;
            color: white;
            border-color: var(--sap-gold);
            outline: none;
            box-shadow: 0 0 10px rgba(243, 156, 18, 0.3);
        }

        .auth-btn {
            background: var(--sap-gold);
            color: var(--bg-dark);
            border: none;
            padding: 12px 20px;
            border-radius: 8px;
            font-weight: bold;
            width: 100%;
            cursor: pointer;
            margin-bottom: 10px;
            transition: 0.3s;
        }

        .auth-btn:hover {
            background: #e8a412;
            transform: translateY(-2px);
        }

        .auth-toggle {
            color: var(--text-dim);
            text-align: center;
            margin-top: 20px;
        }

        .auth-toggle button {
            background: none;
            border: none;
            color: var(--sap-gold);
            cursor: pointer;
            text-decoration: underline;
        }

        .user-info {
            background: rgba(0, 112, 210, 0.1);
            border: 1px solid var(--sap-blue);
            border-radius: 8px;
            padding: 10px 15px;
            margin-bottom: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .user-email {
            color: var(--text-dim);
            font-size: 0.9rem;
        }

        .logout-btn {
            background: #e74c3c;
            color: white;
            border: none;
            padding: 5px 12px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 0.85rem;
        }

        .logout-btn:hover {
            background: #c0392b;
        }

        /* Topic Popup Modal */
        .topic-popup {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.7);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 2000;
            opacity: 0;
            visibility: hidden;
            transition: opacity 0.3s ease, visibility 0.3s ease;
        }

        .topic-popup.show {
            opacity: 1;
            visibility: visible;
        }

        .topic-popup-content {
            background: var(--card-bg);
            border: 2px solid var(--sap-gold);
            border-radius: 20px;
            padding: 35px;
            max-width: 600px;
            width: 90%;
            max-height: 85vh;
            overflow-y: auto;
            position: relative;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.5);
            animation: slideIn 0.3s ease;
        }

        @keyframes slideIn {
            from {
                transform: translateY(-50px);
                opacity: 0;
            }
            to {
                transform: translateY(0);
                opacity: 1;
            }
        }

        .popup-close {
            position: absolute;
            top: 15px;
            right: 20px;
            background: none;
            border: none;
            color: var(--sap-gold);
            font-size: 2rem;
            cursor: pointer;
            transition: 0.2s;
            line-height: 1;
        }

        .popup-close:hover {
            color: #ff6b35;
            transform: scale(1.2);
        }

        .popup-title {
            color: var(--sap-gold);
            font-size: 1.8rem;
            font-weight: bold;
            margin-bottom: 20px;
            border-bottom: 2px solid var(--sap-gold);
            padding-bottom: 15px;
        }

        .popup-definition {
            background: rgba(0, 112, 210, 0.1);
            border-left: 4px solid var(--sap-gold);
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
            font-size: 1.05rem;
            line-height: 1.6;
        }

        .popup-points-title {
            color: var(--sap-gold);
            font-weight: bold;
            margin-top: 20px;
            margin-bottom: 12px;
            font-size: 1.1rem;
        }

        .popup-list {
            list-style: none;
            padding: 0;
        }

        .popup-list li {
            padding: 10px 0;
            padding-left: 25px;
            position: relative;
            color: var(--text-dim);
            line-height: 1.5;
        }

        .popup-list li:before {
            content: "▸";
            position: absolute;
            left: 0;
            color: var(--sap-gold);
            font-size: 1.2rem;
        }

        .popup-actions {
            display: flex;
            gap: 10px;
            margin-top: 25px;
            padding-top: 20px;
            border-top: 1px solid #334155;
        }

        .popup-actions button {
            flex: 1;
            padding: 10px 15px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            transition: 0.3s;
            font-size: 0.95rem;
        }

        .popup-edit-btn {
            background: var(--sap-blue);
            color: white;
        }

        .popup-edit-btn:hover {
            background: #0052a3;
            transform: translateY(-2px);
        }

        .popup-close-btn {
            background: #334155;
            color: var(--text-main);
        }

        .popup-close-btn:hover {
            background: #475569;
            transform: translateY(-2px);
        }

        .sync-status {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: var(--card-bg);
            border: 1px solid #334155;
            border-radius: 8px;
            padding: 10px 15px;
            font-size: 0.85rem;
            z-index: 999;
        }

        .sync-status.synced { color: #2ecc71; }
        .sync-status.error { color: #e74c3c; }

        .hidden { display: none !important; }

        @media (max-width: 992px) { 
            .sidebar { width: 100%; height: auto; position: relative; display: flex; overflow-x: auto; padding: 15px; }
            .main-content { margin-left: 0; padding: 20px; }
            .sidebar h4, .sidebar hr { display: none; }

            .topic-popup-content {
                padding: 25px;
                margin: 20px;
            }

            .popup-title {
                font-size: 1.4rem;
            }
        }
    </style>
</head>
<body>

<!-- Auth Screen -->
<div id="authScreen" class="auth-container">
    <div class="auth-card">
        <div class="auth-title">📚 SAP Library</div>
        <div class="auth-subtitle">Cloud Sync - All Your Topics Ready!</div>
        
        <div id="loginForm">
            <input type="email" id="loginEmail" class="auth-input" placeholder="Email address" required>
            <input type="password" id="loginPassword" class="auth-input" placeholder="Password (min 6 chars)">
            <button class="auth-btn" onclick="handleLogin()">Sign In</button>
            <div class="auth-toggle">
                Don't have an account? <button onclick="toggleAuthMode()">Sign Up</button>
            </div>
        </div>

        <div id="signupForm" class="hidden">
            <input type="email" id="signupEmail" class="auth-input" placeholder="Email address" required>
            <input type="password" id="signupPassword" class="auth-input" placeholder="Password (min 6 chars)">
            <input type="password" id="signupConfirm" class="auth-input" placeholder="Confirm password">
            <button class="auth-btn" onclick="handleSignup()">Create Account</button>
            <div class="auth-toggle">
                Already have an account? <button onclick="toggleAuthMode()">Sign In</button>
            </div>
        </div>

        <div id="authMessage" style="color: #e74c3c; text-align: center; margin-top: 15px; display: none;"></div>
        <div id="authSuccess" style="color: #2ecc71; text-align: center; margin-top: 15px; display: none;"></div>
    </div>
</div>

<!-- Main App Screen -->
<div id="appScreen" class="hidden">
    <div class="sidebar" id="sidebar">
        <h4 class="text-warning mb-3">📚 SAP Library</h4>
        
        <div class="user-info">
            <div class="user-email" id="userEmail">user@email.com</div>
            <button class="logout-btn" onclick="handleLogout()">Logout</button>
        </div>

        <div id="moduleNav"></div>
    </div>

    <div class="main-content">
        <div class="d-flex justify-content-between align-items-center mb-4 gap-3 flex-wrap">
            <input type="text" id="searchInput" class="search-box" placeholder="🔍 Search topics..." onkeyup="searchTech()" style="flex: 1; min-width: 200px;">
            <button class="btn btn-warning fw-bold px-4" onclick="openEditModal(null)">➕ Add Topic</button>
        </div>

        <div class="form-check form-switch mb-4">
            <input class="form-check-input" type="checkbox" id="quizSwitch" onchange="toggleQuizMode()">
            <label class="form-check-label small fw-bold" for="quizSwitch">🎯 QUIZ MODE</label>
        </div>

        <div id="content-area"></div>

        <div class="sync-status synced" id="syncStatus">✓ Synced</div>
    </div>
</div>

<!-- Topic Popup Modal -->
<div class="topic-popup" id="topicPopup">
    <div class="topic-popup-content">
        <button class="popup-close" onclick="closeTopicPopup()">×</button>
        <div class="popup-title" id="popupTitle">Topic Name</div>
        <div class="popup-definition" id="popupDefinition">Definition text here</div>
        <div class="popup-points-title">Key Points:</div>
        <ul class="popup-list" id="popupList"></ul>
        <div class="popup-actions">
            <button class="popup-edit-btn" onclick="editFromPopup()">✏️ Edit Topic</button>
            <button class="popup-close-btn" onclick="closeTopicPopup()">Close</button>
        </div>
    </div>
</div>

<!-- Edit Modal -->
<div class="modal fade" id="editModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-lg">
        <div class="modal-content">
            <div class="modal-header border-secondary">
                <h5 class="modal-title">Edit Technical Topic</h5>
                <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <input type="hidden" id="editIndex">
                <div class="mb-3">
                    <label class="form-label text-warning">Topic / Question</label>
                    <input type="text" id="editName" class="form-control">
                </div>
                <div class="mb-3">
                    <label class="form-label text-warning">Definition / Answer</label>
                    <textarea id="editDef" class="form-control" rows="4"></textarea>
                </div>
                <div class="mb-3">
                    <label class="form-label text-warning">Bullet Points (One per line)</label>
                    <textarea id="editList" class="form-control" rows="4" placeholder="Step 1...&#10;Step 2..."></textarea>
                </div>
            </div>
            <div class="modal-footer border-secondary">
                <button class="btn btn-danger me-auto" onclick="deleteTopic()">Delete Topic</button>
                <button class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                <button class="btn btn-primary" onclick="saveTopic()">Save Changes</button>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
    // ===== PASTE YOUR FIREBASE CONFIG HERE =====
    const firebaseConfig = {
        apiKey: "AIzaSyCqb7gAbpa3UabPU3g_YhNITuPWtWPY4KU",
        authDomain: "ak-events-2016.firebaseapp.com",
        databaseURL: "https://ak-events-2016-default-rtdb.firebaseio.com",
        projectId: "ak-events-2016",
        storageBucket: "ak-events-2016.firebasestorage.app",
        messagingSenderId: "78066764444",
        appId: "1:78066764444:web:742c79b7af7bc58632fb59"
    };

    // Initialize Firebase
    let db, auth;
    let currentUser = null;
    let currentModule = "bw";
    let isQuizMode = false;
    let currentPopupIndex = null;
    let isAuthMode = "login";
    const editModal = new bootstrap.Modal(document.getElementById('editModal'));

    // YOUR BACKUP DATA - Pre-loaded with all your topics!
    let sapData = {"bw":{"title":"SAP BW","items":[{"name":"InfoObject","def":"Foundation of BW modeling. Can be characteristic (dimension) or key figure (measure).","list":["Characteristic: Dimensions (customer, product, time)","Key Figure: Measures (revenue, quantity, cost)"]},{"name":"InfoCube","def":"Star schema database structure combining dimensions and facts.","list":["Contains characteristics and key figures","Basis for BEx queries","Transactional or aggregated data"]},{"name":"CompositeProvider","def":"Combines multiple InfoCubes or InfoObjects without physical joining.","list":["Virtual object","Combines heterogeneous sources","Flexible for complex reporting"]},{"name":"Bex I-Steps","def":"","list":["I_STEP = 1 then Call has taken place directly before any variable entry has been made. ","This can be used to pre populate selection variables ","THis means ABAP customer exit code(CMOD) will be executed before the variable selections screen pops up.","I_STEP = 2 ","then this call has taken place directly after variable entry. This step is only started up when a variable is not input ready ","and could not be filled when I_STEP was equal to 1.","In some of the reports, we may have a need to calculate MTD ,YTD.In such cases the report output is based on input value in the selection screen and ABAP customer exit calculation .","In such cases the ABAP customer exit code has to be executed after the input scree.","If I_STEP = 3, you can check the values of the variables. ","Triggering an exception (RAISE) causes the variable screen to appear once more. Afterwhich, I_STEP=2 is also called again","I_STEP = 0, then the enhancement is not called from the variable screen. T","The call can come from the authorization check or from the Monitor. "]},{"name":"Write Optimised DSO (WDSO)","def":"","list":["Write Optimized DSO doesn't Support Delta it contains only Active Data Table","Data provided using a data transfer process;","W/O Dso are used as a temporary storage data for large set of data that is executing from complex transformation","Data is available for reporting immediately after it is loaded;In this case, a new edge/dimension is added to the InfoCube. During the data selection for the query, the data manager connects the InfoProvider and the master data table ('join') in order to fill the Query.","Mainly this type of DSO's are used for faster loading of large amount of data and then forward the delta to other data targets in BW. Mainly used at Data staging layer e.g. in AP, AR and GL scenarios data will be transferred from DSO to further cube","\"WDSO doesn't not supports delta but request level data","Since write-optimized DataStore objects do not have a change log, the system does not create delta (in the sense of a before image and an after image). When you update data into the connected InfoProviders, the system only updates the requests that have not yet been posted\""]},{"name":"Types of Queues","def":"Update table->\\n\\nExtraction queue ->\\n\\nBW queue =>","list":["All these tables are temporary holding areas for data to manage delta data,","-Update table (SM13) This is like internal factory staging area for raw materials ,this keeps main system run quickly but not immediately sending data to BW queue.","-Extraction Queue (LBWE or SMQ1) ,This is like packing station where items are organised before sent to BW delta queue,This holds data in more efficient format for extraction Collects in small thousands of small changes into single large package.","-BW delta queue (RSA7 OR ODQMON) ,This is like shipping dock where packages wait for delivery truck ."]},{"name":"V1 V2 and V3 Updates","def":"V1-Synchronous update ,When record is generated system will sends acknowledge\\nV2 Asynchronous update, LUW are updated fronted without acknowledge.\\nV3-This update in background by scheduling","list":["V1 – synchronous update (Direct Update). If the update is set to V1, then all tables are update and if any one fails, all are rolled back. Done for all transaction plus critical statistics like credit management, etc.","-> it happened immediately during transaction posting data is return to application table and update tables","In Layman language => Imagine a VIP person, As soon as transaction saved data is immediately sent to BW queue.","V2 – asynchronous update (Queued Delta) – transactions are updated and statistical updates are done when the processor has free resources. If the statistical update fails, the transaction would have still gone through and these failures have to be addressed separately.","->It happens after posting is completed.","In Layman language => To follow standard process -> When transaction is saved it won't sent immediately it puts in temporary area called 'Extraction queue\".A scheduled job calls and sends them all at once to BW queue.","V3 – batch update (Unserialised V3update)– statistics are updated using a batch (periodic) job like every hour or end of the day. Failure behaviour is same as V2 updates.","Statistical update is also used as to describe the initial setup of the statistical tables for LO/LIS. When old transactions are updated in LO/LIS as a one time exercise, then it is called a statistical update also. Once these tables are upto date will all transactions, then every transaction is updated in them using V1, V2 or V3","-> Data is collected in a separate queue and written via scheduled jobs","In Layman language => A massive weekly but order->Transaction data held in update tables it happens in background without effecting user, scheduler job picks from update table and pushes into BW queue."]},{"name":"Virtual Provider","def":"","list":["Virtual info provider with direct access is really slow, and must be threaded wisely. If we have a lot of records transmitting between the remote function calls. There might be a situation where data for the Info provider need not be stored physically. One such model is an Virtual Info provider","\"You use a virtual InfoCube with services if you want to display data from non-BW data sources in BW without having to copy the data set into the BW structures,You can also use your own calculations to change the data before it is passed to the OLAP processor.","\""]},{"name":"Variable Type in Bex","def":"5 Types of variable ","list":["1)Characteristic Value    ","2)Hierarchy   ","3)Hierarchy Node     ","4)Text Variable      ","5)Formula"]},{"name":"Un Serilized V3 Updated mode","def":"","list":["The extraction data of the application being viewed is written to the Update Queue with an V3 update module and is kept there until the data is read with an update collection run and processed.The method \"Unserialized V3 Update\" does not ensure serialization of the document data.","In case of unserialised v3 update LUW's are posted to update queue (SM13). By scheduling the v3 job which moves the document from LBWQ to RSA7 and we extract the LUW's from delta queue to SAP-BW by running delta loads"]},{"name":"Transformation Rule Types","def":"","list":["\"Direct Assignment","Read from Master Data","Routine","Formula","Constant ","No Transformation","Read from Datastore(Advanced)","Read from Datastore\""]},{"name":"Scemantic Partition ","def":"","list":["\"Semantic group is not an inforprovider,It is a tool that used to generate a group from semantically related Datastore Objects(advanced).To simply reporting and analysis over all components of semantic group,Composite provider can be generated.","Advantages :","1)Better performance with mass data,Data set is distributed into data containers.This will decrease in runtime even for the large volume of data.","2) Error Handling is better ,If a request ends with error for specific region then entire info providers data will not be available so in group we can group the data based on region and if any failures data will be available for the others regions except error region.","3) Similarly for time zones,If any data fails for specific zone than entire data will be unavailable but in group only specific zone will be unavailable rest all will be available.\""]},{"name":"DS Safety Intervals ","def":"","list":["\"Safety intervals are used in generic datasource, This helps to avoid records while extracting data from tables or missed any records while extracting.","If you choose Lower limit then you can load data only to DSO with overwrite mode because of duplicate records.","Lowe Limit - It will be opposite to upper limit,The lower limit for safety interval contains the value that needs to be taken from the highest value of the previous extraction to obtain the lowest value of the following extraction.","System will subtract from last delta numeric pointer.","-> If last delta ended at 10:00 and if we set lower limit is +60 then next load starts fro 9:59","Upper Limit - Let's take upper limit is 120 second, your last extraction time 12:00 ,if you start extraction at 12:30 then system will pick from 11:58 to 12:30 and new delta pointer sets to 12;30.","->If extraction runs till 12:00 and if you set 60 seconds as upper limit then system will extraction till 12:01","\""]},{"name":"Semantic Key","def":"The purpose of the semantic key is to identify error in the incoming records or duplicate records. All subsequent data records with same key are written to error stack along with the incorrect data records. These are not updated to data targets; these are updated to error stack","list":[]},{"name":"Start Routine","def":"\"This routine runs at start of the transformation the structure is similar to source structure,here we perform preliminary calculations and store the data in global table or structure,We can modify or delete records here (SOURCE_PACKAGE) .\\nWe declare structure ,Internal table and select queries will be written\\nWe can delete records from SR like \"Delete source_package where UMHAB = 0 and UMSOL = 0and structure is ty_s_SC_1\\n\\n-Delete unwanted records\\n-Set global variable for reuse in field routine.\\n-Apply logic before field-level transformation starts.\"","list":[]},{"name":"Setup Table","def":"","list":["\"The reason for using setup tables is that SAP doesn't permit the extraction structure tables to access the data base tables (EKPO, MARC, VBRP, VBRK ) directly. Instead of getting the data directly from the source tables, data is stored in SETUP tables which u can use for update to BW","----In LO data comes from setup table during setup job (your init load or full), that fill the active cluster tables from the application tables (base table, as you write before…)\""]},{"name":"Star Schema","def":"","list":["\"In star schema the central fact table is surrounded by master data tables(=dimension tables).since master data ","lies with in the cube.","Fact Table is surrounded by Dimension table with Master dta Table (Attributes,Text,Hierarchy)\""]},{"name":"SID Tables","def":"Surrogate id is generated by the system to connect Dimension table and Master table","list":[]},{"name":"Repair Full request","def":"","list":["\"If you indicate a request in full update mode as a repair request, then it is able to update that request in data targets even if they already contain data from initial runs or deltas for this DataSource / source system combination and with overlapping selections.","Consequently, a repair request can be updated to ODS without checking the sequence of delta requests. The system supports loading in an ODS object by using the repair request without having to check the data for overlapping or request sequencing.","This type of load is used for missing or corrupt data and this is used if DSO is in overwrite option and it is not suitable for infocube because it will the records.\""]},{"name":"Remodelling","def":"Add,Replace or Delete the infoobjects in Infocube or DSO(7.3)","list":[]},{"name":"Restricted Key figure","def":"Restricted KF means to restrict a particular KF with some characteristics value. Suppose your key figure is Sales Quantity and you want to restrict it based on any \"Region \"which is your Characteristics then simply drag and drop your KF and right clk on it and just restrict it by the characteristics Material.this will restrict your KF Sales Quantity on the Material Characteristics","list":[]},{"name":"Replacement Path","def":"Replacement path processing type is used in a variable when you wish to get a value from attributes of another character or from a query. \\n","list":["Example:- if you wish to display the age of a customer in your report which will not be in the cube. I mean Age is attribute of customer and not part of the cube. But each transaction record in the cube is assigned with a customer field. So ..if we want to get this value into our report .. we create a variable on customer with replacement path and use its attribute AGE . So when you use this variable in your query for any thing you get the age of the customer associated with that transaction data","Example 2:- When you execute the report Report name should populate ending with current Year.","Create Text variable type = Z_FISCYEAR_REP and references characteristics - 0FISCPER","Infoobject = 0fiscyear","Goto Query Properties->Description -> Sales Report for Fiscal Year &Z_FISCYEAR_REP&"]},{"name":"Queued Delta","def":"\"The extraction data from the concerned application is collected in an Extraction Queue. Then the data will be transferred to Delta queue, in a similar manner to the V3 update, with an update Collections run.\\nUp to 10,000 delta extractions of documents to an LUW in the BW\\ndelta queues are cumulated in this way per DataSource, depending on the application.                                                          When to use this method:More than 10,000 document changes (creating, changing or deleting a documents) are performed each day for the application in question\\\"\\nIn case of Queued Delta LUW's are posted to extractor queue (LBWQ). By scheduling the V3 jobs we move the documents from LBWQ to RSA7 and we extract the LUW's from delta queue to SAP-BW by running the delta loads. Queued Delta is recommended by SAP, it maintains the extractor log which is to handle the LUW's which are missed  (Database Transaction is know as LUW Logical Unit of Work)","list":[]},{"name":"Prerequisites for Extractor Enhance","def":"1.Stop V3 Jobs,Clear the Delta Queue,Stop creating new records. Run the Delta repetitively until zero records","list":[]},{"name":"Partitioning","def":"\"You use partitioning to split the total dataset for an InfoProvider into several, smaller, physically independent and redundancy-free units\\nIt is use to improve the performance of the report by partitioning the infoobject 0CALMONTH AND 0FISCPER; steps:Goto Extras->Db performance->Partitioning  OR It is the method of dividing a table into multiple, smaller, independent or related segments(either column wise or row wise) based on the fields available which would enable a quick reference for the intended values of fields in  the table.\\nNew partition in 7.4 version.\\nMerging Partiion.\\nAttaching partition\\nComplete repartition\"","list":[]},{"name":"ODP and ODQ difference","def":"\"ODP -> It is frame work in SAP  that provides standard way to extract data from different providers( Extractors ,CDS views,HANA views, etc) to consume (BW, SLT, SAC, etc)\\nODQ -> Technical storage (queue) used inside the ODP frame work to store delta changes until consumers extract them\"","list":[]},{"name":"Open HUB","def":"\"The Open Hub Service enables us to distribute data from an SAP BW system into external Data Marts, by flat file or Database Table or Third Party tool analytical applications, and other applications.\\nWhen ever we want to move data from sap bi to flatfile, table we use open hub destinations. Here BI is the source system and flatfile or table are the destinations.\"","list":[]},{"name":"Non Cummulative Keyfigure","def":"\"These key figures where we cannot count or sum the values like head count of employess in a company.\\nIf we need to know the here we want to get the current balance of  in particular account number it doesn't sum up of all deposits and withdraw's.\\nAt this time  we have do this one.keyfigure (Z_CURBAL) is with inflow as Z_DEP and outflow as Z_WITHDRAW in the aggregation tab\"","list":[]},{"name":"Navigational Attribute","def":"If we check infoObject as Navigational Attribute Under Attribute Tab then it is used to restrict,drill down or filter in Query 'as good as other objects'….In this case, a new edge/dimension is added to the InfoCube. During the data selection for the query, the data manager connects the InfoProvider and the master data table ('join') in order to fill the Query.","list":[]},{"name":"Match OR Copy Option BI Content","def":"If we select this option while installing same objects for second time ,object will not get overwritten and remains same","list":[]},{"name":"How to choose Cube or DSO","def":"\"The basic difference in DSO data is over-written and in cube data get added.\\nDSO generally store detailed level of data for example : Data till document no level.\\nCube has Macro level of data.\\nIn DSO data is stored in 2 dimension al format.\\nCUBE data is stored as star schema (Multi Dime signal data).\\nDSO is used for operational reports.\\n Cube is used mainly used for analytical purpose.\\nDSO has overwrite capabilities .\\nInfocube data will get appended.\\nPerformance is better when you report on cube than DSO.\\nWhile DSO gives details data an info cube gives aggregated information.\"","list":[]},{"name":"Master data Tables","def":"","list":["It does not resides in Star schema but resides in other tables there are 4 types of table","P-Master data table in Time Independent","M-View of master data table in Time Independent","X-SID table in Time Independent","T-Text node table","Q-of master data table in Time dependent","N-View of master data table in Time dependent","Y-SID table in Time dependent"]},{"name":"MM Flow","def":"Inquery->Quotation(VA21)->PO(ME21)->Order Confirmation(Va01)->Picking(Vl36)->Packing(VL02,Vl01)->Shipping(VT01)->Invoice(VF21,VF01)","list":[]},{"name":"MultiProvider","def":"\"MP is works as union operator it brings all records irrespective of the target for the given selection\\nUnion of Cubes,infoObject,DataStore object,Aggrgation levels and infosets; it does not contain any data\\nExample: like To combine New and History infoproviders ; Years wise infocubesCY-1 ,CY-2…etc ;Header & Item infoproviders;\"","list":[]},{"name":"Metadata Repository","def":"All BI meta objects and their links are managed centrally in the HTML-enabled , BI Metadata Repository.Other features include exchanging metadata between different systems, exporting HTML pages that  list metadata, and displaying graphics for the objects.","list":[]},{"name":"Difference LBWQ and SM13","def":"\"LBWQ stores extractors data before they moved to Delta queue(RSA7) .When Sales created system writes data into Update tables(MCEXnn ,nn=Application number)\\nLater V3 jobs are processed these records and moves to RSA7\\n\\nSM13 - Monitors Update request at the system level.\\nWhen you post a transaction in ECC first data is written to update tasks and depending on mode(V1.V2,V3) data gets processes.\"","list":[]},{"name":"LO Extraction Steps","def":"\"Make sure the RFC connection is successful\\nSelect the desired Datasource in RSA5(Delivered State) and activate the Datasource it will appear in RSA6(Extract Structure and Setup Tables will be available).\\nActivate the Datasource in BW content and Replicate to get PSA table active.\\nFill the setup table OLI*BW (* Represents Application component)\\nAt BW side create targets and exact the data from datasource by Infopackage an transfer to targets Cube and DSO`s by DTPs. \"","list":[]},{"name":"Key Date","def":"\"When attribute is assigned to characteristics there is an option to specify that attributes are time dependent ,like for example \\nMaterial   From          To                    Material Group\\nM001      1-2-2010    31-12-2012    X\\nM002      1-1-2013    31-12-2014    Y\\n\\nIf user enters specific date between above date then corresponding characteristics Material group data will be populated.\\nIf no date is mentioned then current date data will be populated.\"","list":[]},{"name":"Inventory Data load process","def":"","list":["\"2LIS_03_BX -> Initial Stock Balances ,Used for extracting the initial stock balance of inventory at specific point of time, it is used for initial load of stock quantities and values(Only Full Load)","2LIS_03_BF  -> For Goods movements such as receipts and issues.It loads historical transaction data(Delta capable)","2LIS_03_UM -> For Revaluation data (Change in value but not quantity) ,Transferring posting (Delta capable)records\""]},{"name":"Internal Tables","def":"","list":["\"A comparison between Sorted and Hashed Table ,Reading records from Sorted table uses Binary search but the searching on Hashed table performed by internal Hash algorithm.The searching cost grows on sorted table if the number of records increase but the searching cost on ","Hashed table :- It is always constant regardless the number of records follows Index based .So uses of Hashed table is more faster than the sorted table","Standard Table :- It followed Linear means 1 record after one will search form the tables searching is proportional to number of records.","Sorted Table :- It will sort by default based on the unique key (Here we are defining primary for the internal table),It follows Binary search(It will divide data set into,If values is less than search in upper set else lower set and it will continue till last till find the result).\""]},{"name":"Index","def":"\"Index are use to improve data reading performance but decreases data writing performance (imagine you have book with index), that's why we drop them during the data loading to data target and create again after loading finished. in bw, normally we include this in process chain","list":["Primary index are created by system based on the primary key of the table.","Secondary index, for ods you can create with ods maintenance, right click indexed and add infoobject(s) and  activate ods.","Secondary index on cube can be created in RSA1> Infocube > Performance > Create Index","Index if properly created will reduce the query response time and enhance the performance but wrongly defined index has adverse effect on it\""]},{"name":"Infoset","def":"Join of infoCubes,InfoObject,DataStore object,Infoset is semantic layer over DataSource and is not itself and data Target  OR  Infosets are the joining the 2 tables with the Key fields. if the 2 tables key fields values are same then the data are shown for all the fields of the 2 tables  (If you need values that are common in two objects use Info Set.)","list":["Inner Join = A record can only be in the selected result set if there are entries in both joined tables","Left Outer Join = If there is no corresponding record in the right table, the record is part of the result set","Temporal Joins = A join is called temporal if at least one member is time-dependent","Self Join = The same object is joined together"]},{"name":"Infosource","def":"It is nothing  but a Communication structure,fields of infoSource,You can run more than two Transformation sequentially It transfers the data to any targets  If fields that logically belong together exist in various source systems, they can be grouped together into a single InfoSource in the BI system. In this way, you can assign multiple DataSources to one InfoSource.","list":[]},{"name":"InfoCube","def":"\"It is a set of relational table in accordance with the Star Schema It contains Dimensions,Key figures & Navigational attribute                                                                                                    \\nDimension:InfoCube can have 16 Dimensions 3 are predefined and 13 or customized and 248 charectaristics in each dimension  \\nKeyFigure:contains amount,integers,values\\n","list":["-Stores summarized data, less granular. ",\"- Aggregates can be created on top of Infocubes for better performance of Queries. \",\"- Multi-dimensional reporting possible on Infocube. \",\"- Theres no overwrite feature while loading records\"]},{"name":"Generic Datasource","def":"ALE DELTA = When we are generating MASTER DATA delta we go for ALE delta. If there is any changes in MASTER DATA those effects can also occurs in BW side","list":[]},{"name":"Global Transfer Routine(Exists in Charataristics InfoObject Under General Tab)","def":"Each time you want to convert all incomming data from Source System to InfoObject,We can creat a dedicated Transformation","list":[]},{"name":"Fact Table","def":"Fact table is surrounded by Dimension tables and it contains DIM id and Key figures ,A fact table can contains a maximum of 243 key figures.","list":[]},{"name":"Extended Star Schema","def":"\"the fact table is connect to maximum 16 dimension tables and each dimension table can be connected to a 248 SID tables.so we can analyze the data in 16*248 angles\\n\"","list":[]},{"name":"Exception Aggregation ","def":"Aggregation is done with reference to a external char. (mostly time char.) e.g. Yearly Population: Normal summation will not give correct result. We use exception aggregation as Last Value and year as reference.","list":[]},{"name":"Exception in Bex","def":"You can define threshold values (exceptions) for a query. Data that varies from these thresholds is highlighted in colour or marked with icons","list":[]},{"name":"End Routine","def":"An end routine is a routine with a table in the target structure format as input and output parameters. You can use an end routine to post-process data after transformation on a package-by-package basis. \\nEnd Routine is process before the values are transferred to Target.\\nData is stored in result_package.End routine has the structure of the target and result_package contains the entire data which finally is the output.","list":["Example :- If source Vendor account group is Z001 then press G value files else 'H'."]},{"name":"Expert Routine","def":"\"It contains both Source and target structures,this will be applicable when there is no sufficient function to perform transformation,In Expert Routine we will read from source_package which contains all the data and update into result_package which should be the output.\\nFor expert routine everything written in Codes ins impel it performes all actions START,END,and FIELD\"","list":[]},{"name":"Error Handling OR Error Stack","def":"Error Stack is request based table which contains erroneous records which are colledted into stack and not moving to targets if \"error handling for DTP is activated \" Once erroneous records rectified then we can move same record to target from Error stack  Errors Can be: Un allowed characteristics ; Lower Case letters ;Master data read unsuccessful ; Overlapping with time intervals ;No SID for Navigationa attribute and Characteristics values","list":[]},{"name":"Export DataSource","def":"This is required when u want to send data from one infoprovider to another infoprovider in same system or in external BIW system.","list":[]},{"name":"Emulated DataSource","def":"Converting From 3.x to 7.0 DataSource","list":[]},{"name":"SD Datasources","def":"","list":["\"2LIS_11_VAITM -Sales Document Item;","2LIS_11_VAHDR-Sales Document Header;","2LIS_11_VASCL-Sales Document Scheduled Line .","2LIS_11_V_ITM-Sales Document Item Allocation.","2LIS_11_V_SCL-Sales Document scheduled line Allocation   .","2LIS_12_VCHDR-Delivery Header","2LIS_12_VCITM-Delivery Item","2LIS_13_VDHDR-Billing Header","2LIS_13_VDITM-Billing Item ","2LIS_13_VDKON-SD Billing Condition.\""]},{"name":"Data source enhancement using FM","def":"","list":["\"Select the required FM and for every FM we have group ,So copy the function group and to copy all declaration next copy the FM RSAX_BIW,GET_SIMPLE_DATA and its FM group is RSXX.","1.Chnage the table of the FM under Tables tab parameter type = E_T_DATA and define the structure.","2.GOTO to source code and add the write select query from respective table and ins E_T_DATA.","Example - Enhance the 0FI_GL_4 DATASOURCE USING SAMPLE_PROCESS_0005021 and function group BFFMSMPL3.","First append files in the structure and don't forgot to add reference file.","1-Vendor Account Number.","2-Standard Price.","3-Purchase order quality.","4-Net price.\""]},{"name":"DataSource Enhancement","def":"","list":["\"DS:2LIS_11_VAITM (Sales Document Item) to get MTART(Material Type) field.","Setps: Check the field in Communication structure if yes than Steps1- Deactivate the datasource in LBWE and clear the delta queue in RSA7","Step 2 - Drag the field from Communication structure to selection structure.","Step3 -Activate the ds and coding is not required because data is already populating.","If no field in Com then.","Step1- Goto RSA2 enter the DS and open ,double click the extract structure .","Step2-Click the Append button to enable the session for adding new fields and activate the new structure .","Step3-Goto CMOD RSAP0001 and Select the Component EXIT_SAPLRSAP_001.","Step4-Double click on ZXRSRU01 to populate the new field from DB table.","Declare L_V_VAITM type MCVA0ITM.","LOOP AT C_T_DATA into l_v_vaitm.","LV_Index = sy_index.","select single mtart from mara where MATNR = L_V_VAITM-MATNR.","IF SY-SUBRC = 0.","MODIFY C_T_DATA from L_V_VAITM index lv_index.","Endif.\""]},{"name":"Delta Options in  Generic Datasource","def":"","list":["\"Calday- This type of delta update is used only once in a day use upper limit .","Timestamp :Since delta is timestamp we can run the delta multiple times in day","Numeric Pointer-If we set Delta then it will only recognise new created records but not modified records\""]},{"name":"Datasource options","def":"","list":["\"SELECTION - > What ever the fields we select here those fields can appear at DATA SELECTION tab of INFOPACKAGE.","HIDE -> What ever the fields we select here those fields can't be appear in BW side.","INVERSION -> This option is available for Key figures. It takes –ve sign to the existing values it is used for reverse posting in FI .","FIELD ONLY -> This option also available for Key figures. If there is any Enhancement for a particular field at that time this is enabled.","In VIEW the EXTRACT STRUCTURE is automatically created, but in FUNCTION MODULE we must created the EXTRACT STRUCTURE explicitly.\""]},{"name":"Generic Datasouce Images","def":"","list":["\"Additive = say suppose you have sales order and quantity like  1111   30 which is loaded to cube(BW)."," now same record qty has changed from 30 to 40. As we have additive delta, we will get new record as 1111  10.","In additive delta You will get Difference = second record- first record = 17000-20000 = -3000","New Status for changed records =If the update type is setup to NEW STATUS for changed records then it becomes mandatory for us to load data into ODS and then ODS to CUBE","in New Status for changed records you will get chaged record = 17000.","20000+(before image\\\\change)","20000- (reverse image\\\\ change)","17000+(after image\\\\change)\""]},{"name":"Debugging","def":"","list":["\"F5- mean single step, so if there is a loop commnad, it will keep reapting till the loop is completed.","F6- is used if you want to skip step by step debugging of a subroutine \\\"perform .....\\\"","F7- is used if you are inside a FM or LOOP it will immediately take you out of that FM or LOOP .","F8-means execute the program.\""]},{"name":"Direct Delta","def":"\"With this update mode, extraction data is transferred directly to the BW delta queues every time a document is posted. In this way, each document posted with delta extraction is converted to exactly one LUW in the related BW delta queues.\\nIf you are using this method, there is no need to schedule a job at regular intervals to transfer the data to the BW delta queues.\"","list":[]},{"name":"Direct DSO","def":"In this DSO data loading through DTP is not possible and BAP`is are used to update .Such DSO are mainly used to store the APD analysis results.System deleted all existing records when we do new data request upload.\\nDoes not support Data marts.\\nDoes not support ETL.\\nOnly active table exists.","list":[]},{"name":"Difference Classic And Extended Start Schema","def":"","list":["\"Classic - Dimension table and Master tables are same and we can analyse 16 angles.","Extended Schema - Dimension Table and Master table are different and connected to Master data table separately using SID tables .","SID are in Dimension Table \""]},{"name":"Difference B/W DSO & Infocube","def":"","list":["\"1)In ODS, data is stored in flat tables. By flat we mean to say ordinary transparent table whereas in a CUBE, it composed of multiple tables arranged in a STAR SCHEMA joined by SIDs. The purpose is to do MULTI-DIMENSIONAL Reporting","2) In ODS, you can update an existing record given the KEY. In CUBES, theres no such thing. It will accept duplicate records and during reporting, SUM the keyfigures up. Theres no EDIT previous record contents just ADD. With ODS, the procedure is UPDATE IF EXISTING (base from the Table Key) otherwise ADD RECORD\""]},{"name":"DSO","def":"","list":["In BI 7.0: DSO(Data Store Object)","DSO have 3 types:","1.Standard DSO ->Consists of three tables: Activation queue/New Data Table, Active Data Table & change log.","2.Write-Optimized DSO","3.Direct Update DSO->Active Data Table and no SID generation."]},{"name":"Diff 3.x and 7.0","def":"","list":["Dataflow in 3.5 SS->DS->PSA->Transfe Rule->InfoSource->Comm Structure OR (Update Rule)->Data Target","In 3.5 Processing PSA is Optional","In 3.5 Infoset  can be created by ODS and InfoObject","Dataflow in 7.0 SS->DS->PSA->Transformation(DTP)->Data Target","In 7.0 Processing is must ,by use of this we can move data","In 7.0 Infoset can be created ODS ,InfoCube,InfoObject"]},{"name":"DTP","def":"","list":["It executes the transformation OR  As the name suggest, it is the Data transfer Process by which you can actually trigger the data load from PSA to the  data target DTP is used to load the data from PSA to Corresponding Data Targets in 7.0.","Active Table (with Archive)-The data is read from the DSO active table and from the archived data.","Active Table (Without Archive)-The data is only read from the active table of a DSO. If there is data in the archive or in near-line storage at the time of extraction, this data is not extracted.","Archive (Full Extraction Only)-The data is only read from the archive data store. Data is not extracted from the active table.","Change Log-The data is read from the change log and not the active table of the DSO"]},{"name":"DataSource OR PSA","def":"It is a transver structure,fields of DataSource OR This structure is same as Source System","list":[]},{"name":"Documents","def":"","list":["The Documents function enables you to add, search, and create links between","documents in various formats, versions, and languages for BI objects."]},{"name":"Data Modelling","def":"Creating of cubes ,Transformation…ETC","list":[]},{"name":"Dimension Table","def":"","list":["\"We need to check the info cube ration in SAP_INFOCUBE_DESIGN program if it exceeds 20% of the fact table then we need to change the dimension objects","1)Line Item Dimension:Rgt.clk.properties -it increases performances ex:If there is only one infoObject in one dimension then if we check \\\"line item dimension\\\" then it is connected directly to Master table ","2)High Cardinality-It is use for query performance only when there is a infoObject in Time characteristics ;Change of Indexing to BIT TREE from BIT MAP,Bit Map indexing are crated and processor will perform bit wise operation ,this indexing technique is very efficient and used when cardinality is low","Best practise for creating Dimensions is that attributes with 1:N relation ship should be stored in the same dimension(Eg; Material ,Group Material) and Attributes with M:N relation ship should be different dimention.","Reason behind this is to import ve query performance, reduce the consumption of databases space.","Lets us take a scenario of plant and material say there are 10 plants and 10 material.","Case -1: We are placing plant and material in 1 dimension ,You may get maximum of 10*10 -100 records in your dimension table as there are possibilities that 1 plant can deal with all the 10 materials and similarly the other plants also.So you will sendup with 100 combinations of records in your dimensions table.","CAse -2 :- Placing plans and material in different dimension .","As there are 10 plants you will have 10 records in your plant dimension table and 10 records in your Material dimension table as you have 10 materials ,So there are totally 20 records in both the dimension table.s\""]},{"name":"Dimension Table","def":"\"Minimum of four dimension tables and a maximum 16 Of these, 13 of the are customer-created and three are the SAP-supplied dimensions.  Fact Table contains DIM ID`s and Key figures and Each Dimension can have 248 Characteristics; Dimension table is connect to Hierarchy,Text,Attributes table by SID Tables\\nBy Default 3 Dimension Tables 1)Data Packet (/BIC/P) 2)Unit (/BIC/U) 3) Time (/BIC/T)\\n\\nSlowly Changing Dimension: No. of employees in a company ,It is used where data changes slowly over a time ,Instead of overwriting old values SCD helps us to track historical changes.\"","list":[]},{"name":"Customer Exit","def":"\"Variable type- Characteristics,Processing type -Customer Exit.\\nGoto CMOD enter the project RSR00001 and select component .\\nSelect the component EXIT_SAPLRRSO_001.\\nDouble click on ZXRSRU01 include to write the logic for variable.\\nScenario 1:: To get all plants if we enter a Text A same need to get Plants IN to 1005 in the same way for B and C.\\nScenario 2 :: When User enters current year then he should get previous year records in new column\\n\\nDeclare L_S_RANGE type RSR_S_RANGESSID\\ni_step=2\\nCase i_vnam.\\nWhen Zpalnt.\\nloop at l_s_range into lv_table.\\nIf lv_table-Country = 'IN'.\\n\\nL_S_RANGE-LOW = 'P001'\\nL_S_RANGE-HIGH = 'P005'\\nL_S_RANGE-SIGN = 'I'\\nL_S_RANGE-OPT = 'BT'\\n \\nEND CASE\\nAPPEND L_S_RANGE TO E_T_RANGE.\\nENDLOOP.\\n\\nImport Parameter : I_VNAM holds the name of the variable\\nImport Parameter : I_T_VAR_RANGE hold values and variables that are available in BEx report\"","list":[]},{"name":"Cell Definition","def":"\"Cell definition is a useful functionality of BEx Query Designer which helps us to uniquely define each cell that is present at the intersection of two structures\\n\"","list":[]},{"name":"charecteristics OR Field Routine","def":"It operates on a single record for a single characteristic or key figure. The value gets modified in the routine based on one or more source fields before it is transferred to the target (SOURCE_FIELDS)","list":[]},{"name":"Compounding","def":"It is an attribute of two char to make one, none of them exits without the other one Example is Plant is the compounding of Storage location","list":[]},{"name":"Calculated Key figure","def":"\"Calculated key figures consist of formula definitions containing basic key figures, restricted key figures or pre-calculated key figures.                                                                                                                                                                             If you want add one more filed in reporting point of view, that means for example you have employee salary and commision two key figures are there you want to add one more field, that is Tax, so, you can add one new filed by using some formula.. and caliculate the TAX                                                                                                                                                              In a DSO we have two iteam Qty and price... and in target we require Revenue.\\nSo it will be Price * Qty= Revenue ( CKF)  Again suppose u require the revenue for the month of April 2008.\\nNow with the Help of RKF you can restrict the revenue for the month of April 2008 only,  so that in RSRT (query) you will find the revenue for the month or April\"","list":[]},{"name":"Change log (Table)","def":"Contains the change history for the delta update from the DataStore object into other data targets, such as DataStore objects or InfoCubes\\nafter activation in active data table\\nCompany code; price; quantity\\n1000 300 15\\nin change log\\n1000 200 10\\n1000 200 10 -\\n1000 300 15","list":[]},{"name":"Compress","def":"\"Compression is used to save the memory space as well as improve the performance of cube,Compressed old Request to 0 (zero),Compressed data will move from F table to E table,Every data in infocube is uniquely identified with request ids  the concept of deleting these deleting ids is called compression\\n\\nCompression improves Performance Tuning as it removes the redundant data. This improvement in the performance can be checked by RSRT and running the query with compression & without compression.Smaller the F table results in accelerated loading into F table and Faster updating of the F table Indexs and Accelerates aggregate rollup  since fact table is source of table for Rollup.\"","list":[]},{"name":"Communication structure","def":"The communication structure is the structure underlying the InfoSource.","list":[]},{"name":"Braodcasting","def":"It allow an instant Distribution of objects or scheduling object distribution   EX: sending mail every month of budget report RSDS_ADMIn code for broadcasting or Modelling ->Administration-Broadcasting","list":[]},{"name":"Bex Reporting","def":"NODIM = Is used to remove units and currencies and returns only numeric values in the output \\nExample -If we have two quantity for example profit and revenue and their dimensions are different for example amount is integer,\\nIf we require to add or subtarct them in certain condition then we will not be able to add or subtract then in that case we use this function","list":[]},{"name":"BI Content","def":"\"BI Content provides preconfigured information delivered by SAP for various Modules it contains Cubes,InfoSource,Transformation,Infoobjects….etc                                                                                                 \\nGrouping :1)Necessary Object 2)In DataFlow Before (3) In DataFlow After 4) In DataFlow Before and After Install.         \\nInstall: 1)Simulate Installation2) Install3)Install Background4)Install and Transport.                                                               \\n","list":["Display: 1)Tree Display 2) Network Display.                                                                                                              ","Collection Mode: 1) Collect Automatically 2) Start Manual Collection.\""]},{"name":"Archiving Process","def":"\"If you want to load the archive request to reload then request will get deactivate and ready to load to target again .\\n-We cannot load the data for archived period,Only u can do is by dearchve it mean we have to reload the data and then u can modify the data in the info provider.\\nTcode SARA to view Archive administration.\"","list":[]},{"name":"Attribute Change Run","def":"\"Attribute change run is the process in BW wherein the master data get activated (whatever has been recently loaded) and adjusted in the aggregates .Attribute Change Run will activate the master data in info object and updates the aggregates with new data if you have any aggregates built on this info object\\nAttribute change run is nothing but adjusting the master data after its been loaded from time to time so that it can change, generate or adjust the SID's. This ensures you do not have any problem when loading the transaction data in to data targets. It is used for realignment of the master data\\n\\nAchange run referee to :-\\nActivate master data changes to attribute and hierarchies.\\nRealign aggregates containing navigational attributes.\\nRealign aggregates defined on hierarchies level.\\nTo Activate new master data ,a change run must be performed even though the attribute or hierarchy is not used in any aggregrates.\"","list":[]},{"name":"Application Components","def":"","list":["01-Purchasing","05-QM","11-Sales Item","12-Delivery","13-Shipping"]},{"name":"APD ","def":"\"APD is a workbench with user interface for creating, executing monitoring analysis processes ,The data can be merged from different source apply transformations and generate result\\n1)Normal approach :- If the analysis is recurring and needed for reporting dashboard ,Go with DSO + transformation and reporting or scheduling process chain\\n2)APD approach: If the analysis is adhoc or require vocationally then go for APD , quick to built and maintenance overhead you can change filter later as per requirement.\\n","list":["Example :- Finance team wants to analyse 'Customer Profitability for last 6 month.(Sales DSO ,FI DSO and Customer master)","1) Normal flow :- ,we will be creating new DSO build transformation from Sales DSO,FI DSAO and Master data. Schedule process chain and get the data.","This would add extra objects like DSO ,TRFN and price chains.which requires permanent maintenance even though business needs data only occasionally","2) APD approach :- Datasource (Sales DSO,Fi DSo,Customer Data).","Join -> Join Customer ID","Formula-> Customer Profit = Revenue - Cost.","Enrich -> Join with Customer master )Region,Industry)","Output -> Generate flat file .","No Extra BW objects created ,Just APD when needed export result.\""]},{"name":"Activation queue(Table):","def":"Used to save DataStore object data records that need to be updated, but that have not yet been activated. After activation, this data is deleted if all requests in the activation queue have been activated. See: Example of Activating and Updating Data","list":[]},{"name":"Aggregate","def":"\"Aggregates are mini cubes which is subset of info cube data ; they are used to improve the performance when doing query; similar to indexes on a table Ex:Country,Customer,Sales…..If we Aggregate on Particular country then that country data will be displayed\\n\\nAn aggregate is a materialised, summarised view of the data in an InfoCube. In other words, it consolidates and stores a subset of InfoCube data into a database. This subset of data is redundant and persistent. When we execute a query on an InfoCube with appropriate aggregates, the query reads the summarised data directly from the database thus eliminating the need to perform any processing related to summarisation during query runtime.\\n\\nLarge no of '-' Sign symbol shows the worst evaluation of aggregates and '+' better \"","list":[]},{"name":"Aggregate rollup","def":"Rollup is to fill the aggregates ","list":[]},{"name":"Administration:","def":"1)The Monitoring tab in the administration section enables you to monitor and control data-loading processes and any additional data processing in the BI system.\\n2)Another significant function within administration is the creation execution and\\nmonitoring of process chain","list":[]}]},datasphere:{title:"SAP Datasphere",items:[{name:"Table (Local Table)",def:"Physical table stored in SAP Datasphere holding data from imports or replication.",list:["Store raw data from CSV imports","Target for replication/data flows","Can be marked as Relational Dataset, Dimension, or Fact"]},{name:"Remote Table",def:"Virtual reference to table in external source system without importing.",list:["Real-time federation OR snapshot-based access","Sources: SAP S/4HANA, BW/4HANA, Databases, Cloud","Real-time slower; snapshots cache locally"]},{name:"Graphical View",def:"No-code/low-code visual tool to combine, transform, and enrich data.",list:["Join, Union, Projection, Aggregation, Filter","Can be Relational Dataset, Dimension, or Fact","Must be manually deployed"]},{name:"SQL View",def:"View created using SQL code for advanced transformations and complex logic.",list:["Native HANA SQL syntax","For scenarios graphical views cannot handle","Must be manually deployed"]},{name:"Analytic Model (★ PRIMARY)",def:"Multi-dimensional analytical model for consumption in SAP Analytics Cloud.",list:["Source: Fact Views","Dimensions, Measures, Calculated Measures, Restricted Measures","Variables for user input, Hierarchies, Associations","Replaced Analytical Dataset - now legacy"]},{name:"Fact View",def:"View with semantic type Fact - represents transactional/measures data.",list:["Must have at least one measure","Must have associations to dimensions","Source for Analytic Models","Separates relational from analytical modeling"]},{name:"Dimension View",def:"View with semantic type Dimension containing master data and hierarchies.",list:["Key Attribute, Text Attributes","Hierarchies (level-based or parent-child)","Time-dependent attributes","Referenced in Facts via associations"]},{name:"Entity-Relationship Model",def:"Data modeling container showing relationships between tables and views.",list:["Visualize dependencies between objects","Define relationships and cardinality","Dependency analysis and impact assessment"]},{name:"Replication Flow",def:"Automated data replication from source systems with initial and delta loads (ELT approach).",list:["Sources: ABAP CDS Views, ODP Extractors, ABAP Tables","Load Types: Initial, Delta, or Both","Targets: Tables, HANA Cloud, external systems","Auto-deployed and highly efficient"]},{name:"Data Flow",def:"Graphical tool for complex ETL with code capability - transform first, then load.",list:["Operators: Join, Union, Filter, Aggregation, Python Script","Python scripting for custom transformations","Target: Always persists to table","Must be manually deployed"]},{name:"Task Chain",def:"Workflow orchestrating multiple tasks (flows, jobs) in sequence or parallel.",list:["Components: Data Flows, Replication Flows, nested Chains","Execution: Serial or parallel","Dependency management and error handling","Similar to BW Process Chains"]},{name:"Semantic Types (Core Concept)",def:"Classification defining analytical purpose of views/tables.",list:["Relational Dataset: Default, non-analytical","Dimension: Master data with hierarchies","Fact: Transactional data with measures"]},{name:"Association",def:"Link between Fact and Dimension objects enabling drill-down and attribute retrieval.",list:["Source: Field in Fact","Target: Key in Dimension","Multi-level associations (A→B→C)","Only required joins executed at query time"]},{name:"Hierarchy",def:"Organizational structure for dimensions - parent-child or level-based.",list:["Level-Based: Fixed levels (Country→State→City)","Parent-Child: Dynamic relationships","Multiple hierarchies per dimension","Time-dependent hierarchies supported"]},{name:"Measure/Metric",def:"Numerical value for analysis - KPI or aggregated value.",list:["Base Measure: Directly from source data","Calculated Measure: Custom formula","Restricted Measure: Base measure with filter","Aggregation: Sum, Average, Min, Max, Count"]},{name:"Variable",def:"Input parameter for dynamic filtering/prompting in Analytic Models.",list:["Filter Variables: Dimension member selection","Source Variables: Parameters from fact","Restricted Measure Variables: Dynamic measure filters","Mandatory/optional, single/multi-value"]},{name:"Calculated Column",def:"New column derived from existing columns using expressions.",list:["Add computed fields without views","Unit conversions, conditional logic","String manipulation","Available in views where created"]},{name:"Connection",def:"Configuration for connecting to external data sources.",list:["Types: S/4HANA, BW/4HANA, Databases, Cloud, SFTP, APIs","Enable data federation and replication","Authentication and proxy configuration"]},{name:"Space",def:"Virtual workspace containing models, connections, resources for user group.",list:["Dedicated storage and compute resources","User access control within space","Connection sharing within space","Isolation from other spaces"]},{name:"Data Access Control (DAC)",def:"Row-level security restricting data access based on user attributes.",list:["Restrict fact/dimension rows","Assign users to organizational units","Applied automatically in models","Enforce privacy and compliance"]},{name:"Data Catalog",def:"Central metadata repository for governance and discovery.",list:["Glossary Terms: Business definitions","KPIs: Key performance indicators","Repository Explorer: Search and browse","Impact and Lineage: Dependencies"]},{name:"Intelligent Lookup",def:"Smart joining mechanism for matching entities without traditional keys.",list:["Fuzzy matching, composite keys","Solve complex data matching","More flexible than standard joins","Higher performance cost"]},{name:"Parameter (Input Parameter)",def:"Dynamic value passed into views/flows at execution time.",list:["Create parameterized views","Different scenarios","Used in graphical views, SQL views, data flows"]}]},sac:{title:"SAC",items:[{name:"Story",def:"SAC visualization and dashboard combining multiple pages and visualizations.",list:["Canvas for designing reports","Multiple pages for different analyses","Drill-down and interactive features"]},{name:"Model",def:"Data source connected to SAC from Datasphere or BW.",list:["Live data connection","Real-time or cached mode","Supports analytics and planning"]}]},hana:{title:"HANA",items:[{name:"Calculation View",def:"HANA modeling tool combining relational and analytical scenarios.",list:["Join, Aggregation, Union operations","Graphical and SQL variants","Basis for many Datasphere views"]},{name:"Graphical View",def:"Visual composition of HANA objects.",list:["Join, Union, Projection","No-code modeling","Restricted Measures and calculated columns"]}]},bo:{title:"BO/WebI",items:[{name:"Universe",def:"Semantic layer between database and reporting tools.",list:["Business-friendly object names","Predefined joins and calculations","Access control and row-level security"]},{name:"Report",def:"WebI report built on universe",list:["Query results and formatting","Drill-down and filters","Multiple blocks and tables"]}]}};

    // Initialize Firebase
    try {
        firebase.initializeApp(firebaseConfig);
        db = firebase.database();
        auth = firebase.auth();

        auth.onAuthStateChanged(user => {
            if (user) {
                currentUser = user;
                document.getElementById('authScreen').classList.add('hidden');
                document.getElementById('appScreen').classList.remove('hidden');
                document.getElementById('userEmail').innerText = user.email;
                loadDataFromCloud();
            } else {
                currentUser = null;
                document.getElementById('authScreen').classList.remove('hidden');
                document.getElementById('appScreen').classList.add('hidden');
            }
        });
    } catch (error) {
        alert('Firebase Error: ' + error.message);
        console.error('Firebase init error:', error);
    }

    // Authentication
    function toggleAuthMode() {
        isAuthMode = isAuthMode === 'login' ? 'signup' : 'login';
        document.getElementById('loginForm').classList.toggle('hidden');
        document.getElementById('signupForm').classList.toggle('hidden');
        document.getElementById('authMessage').style.display = 'none';
        document.getElementById('authSuccess').style.display = 'none';
    }

    function handleLogin() {
        const email = document.getElementById('loginEmail').value.trim();
        const password = document.getElementById('loginPassword').value.trim();

        if (!email || !password) {
            showMessage('Please fill in all fields', 'error');
            return;
        }

        auth.signInWithEmailAndPassword(email, password)
            .catch(error => showMessage('Login Error: ' + error.message, 'error'));
    }

    function handleSignup() {
        const email = document.getElementById('signupEmail').value.trim();
        const password = document.getElementById('signupPassword').value.trim();
        const confirm = document.getElementById('signupConfirm').value.trim();

        if (!email || !password || !confirm) {
            showMessage('Please fill in all fields', 'error');
            return;
        }

        if (password.length < 6) {
            showMessage('Password must be at least 6 characters', 'error');
            return;
        }

        if (password !== confirm) {
            showMessage('Passwords do not match', 'error');
            return;
        }

        auth.createUserWithEmailAndPassword(email, password)
            .then(() => {
                showMessage('Account created! Signing in...', 'success');
                setTimeout(() => handleLogin(), 2000);
            })
            .catch(error => showMessage('Signup Error: ' + error.message, 'error'));
    }

    function handleLogout() {
        auth.signOut().catch(error => showMessage('Logout Error: ' + error.message, 'error'));
    }

    function showMessage(msg, type) {
        const errorEl = document.getElementById('authMessage');
        const successEl = document.getElementById('authSuccess');
        
        if (type === 'error') {
            errorEl.innerText = msg;
            errorEl.style.display = 'block';
            successEl.style.display = 'none';
        } else {
            successEl.innerText = msg;
            successEl.style.display = 'block';
            errorEl.style.display = 'none';
        }
    }

    // Cloud Sync
    function loadDataFromCloud() {
        if (!currentUser) return;

        const ref = db.ref('sap_library/' + currentUser.uid + '/topics');
        ref.on('value', snapshot => {
            const cloudData = snapshot.val();
            if (cloudData) {
                sapData = cloudData;
            }
            init();
            updateSyncStatus('✓ Synced');
        }, error => {
            updateSyncStatus('✗ Sync Error');
            console.error('Load error:', error);
        });
    }

    function saveToCloud() {
        if (!currentUser) return;

        const ref = db.ref('sap_library/' + currentUser.uid + '/topics');
        ref.set(sapData)
            .then(() => {
                updateSyncStatus('✓ Saved');
                setTimeout(() => updateSyncStatus('✓ Synced'), 1000);
            })
            .catch(error => {
                updateSyncStatus('✗ Error');
                console.error('Save error:', error);
            });
    }

    function updateSyncStatus(status) {
        const el = document.getElementById('syncStatus');
        el.className = 'sync-status synced';
        el.innerHTML = status;
    }

    // App Functions
    function init() {
        const nav = document.getElementById('moduleNav');
        nav.innerHTML = "";
        Object.keys(sapData).forEach((key) => {
            const btn = document.createElement('button');
            btn.className = `module-btn ${key === currentModule ? 'active' : ''}`;
            btn.innerText = sapData[key].title;
            btn.onclick = () => { currentModule = key; init(); render(); };
            nav.appendChild(btn);
        });
        render();
    }

    function render() {
        const data = sapData[currentModule];
        let html = `<h2 class="text-warning mb-4">📖 ${data.title}</h2>`;
        data.items.forEach((item, idx) => {
            html += `
                <div class="tech-card" onclick="openTopicPopup(${idx})">
                    <button class="edit-btn" onclick="event.stopPropagation(); openEditModal(${idx})" title="Edit">✏️</button>
                    <h5 class="text-info">Q: ${item.name}</h5>
                    <p style="margin-bottom: 0; color: var(--text-dim); font-size: 0.9rem;">Click to view details →</p>
                </div>`;
        });
        document.getElementById('content-area').innerHTML = html;
    }

    function openTopicPopup(idx) {
        currentPopupIndex = idx;
        const item = sapData[currentModule].items[idx];
        
        document.getElementById('popupTitle').innerText = item.name;
        document.getElementById('popupDefinition').innerText = item.def;
        
        const listHtml = item.list && item.list.length > 0 
            ? item.list.map(point => `<li>${point}</li>`).join('')
            : '<li>No additional points</li>';
        
        document.getElementById('popupList').innerHTML = listHtml;
        document.getElementById('topicPopup').classList.add('show');
    }

    function closeTopicPopup() {
        document.getElementById('topicPopup').classList.remove('show');
        currentPopupIndex = null;
    }

    function editFromPopup() {
        closeTopicPopup();
        openEditModal(currentPopupIndex);
    }

    function openEditModal(idx) {
        document.getElementById('editIndex').value = idx === null ? "" : idx;
        if (idx !== null) {
            const item = sapData[currentModule].items[idx];
            document.getElementById('editName').value = item.name;
            document.getElementById('editDef').value = item.def;
            document.getElementById('editList').value = item.list ? item.list.join('\n') : "";
        } else {
            document.getElementById('editName').value = "";
            document.getElementById('editDef').value = "";
            document.getElementById('editList').value = "";
        }
        editModal.show();
    }

    function saveTopic() {
        const idx = document.getElementById('editIndex').value;
        const newItem = {
            name: document.getElementById('editName').value,
            def: document.getElementById('editDef').value,
            list: document.getElementById('editList').value.split('\n').filter(l => l.trim() !== "")
        };

        if (idx === "") sapData[currentModule].items.push(newItem);
        else sapData[currentModule].items[idx] = newItem;

        saveToCloud();
        editModal.hide();
        render();
    }

    function deleteTopic() {
        const idx = document.getElementById('editIndex').value;
        if (idx !== "" && confirm("Delete this topic?")) {
            sapData[currentModule].items.splice(idx, 1);
            saveToCloud();
            editModal.hide();
            render();
        }
    }

    function toggleQuizMode() { 
        isQuizMode = document.getElementById('quizSwitch').checked; 
        render(); 
    }

    function searchTech() {
        const term = document.getElementById('searchInput').value.toLowerCase();
        const cards = document.getElementsByClassName('tech-card');
        for (let card of cards) {
            const matches = card.innerText.toLowerCase().includes(term);
            card.style.display = matches ? "" : "none";
        }
    }

    // Close popup
    document.getElementById('topicPopup').addEventListener('click', function(event) {
        if (event.target === this) {
            closeTopicPopup();
        }
    });

    document.addEventListener('keydown', function(event) {
        if (event.key === 'Escape') {
            closeTopicPopup();
        }
    });
</script>

</html>
