<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SAP Master Library</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body{background:#0f172a;color:white;font-family:Segoe UI}
.sidebar{background:#1e293b;height:100vh;padding:20px;position:fixed;width:260px}
.main-content{margin-left:260px;padding:30px}
.module-btn{width:100%;background:none;border:none;color:#94a3b8;text-align:left;padding:10px;border-radius:8px}
.module-btn:hover,.module-btn.active{background:#0070d2;color:white}
.tech-card{background:#1e293b;padding:20px;border-left:4px solid orange;border-radius:10px;margin-bottom:15px;cursor:pointer}
.edit-btn{position:absolute;right:15px;top:10px;background:none;border:none;color:#0070d2}
</style>
</head>

<body>

<div class="sidebar">
<h4>📚 SAP Library</h4>
<div id="moduleNav"></div>
</div>

<div class="main-content">

<div class="d-flex gap-3 mb-4">
<input id="searchInput" class="form-control" placeholder="Search" onkeyup="searchTech()">
<button class="btn btn-warning" onclick="openEditModal(null)">Add Topic</button>
</div>

<div id="content-area"></div>

</div>

<div class="modal fade" id="editModal">
<div class="modal-dialog modal-lg">
<div class="modal-content bg-dark text-white">

<div class="modal-header">
<h5>Edit Topic</h5>
<button class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
</div>

<div class="modal-body">

<input type="hidden" id="editIndex">

<div class="mb-3">
<label>Topic</label>
<input id="editName" class="form-control">
</div>

<div class="mb-3">
<label>Definition</label>
<textarea id="editDef" class="form-control"></textarea>
</div>

<div class="mb-3">
<label>Key Points</label>
<textarea id="editList" class="form-control"></textarea>
</div>

</div>

<div class="modal-footer">
<button class="btn btn-danger me-auto" onclick="deleteTopic()">Delete</button>
<button class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
<button class="btn btn-primary" onclick="saveTopic()">Save</button>
</div>

</div>
</div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import {
getFirestore,
collection,
addDoc,
getDocs,
updateDoc,
deleteDoc,
doc
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";


const firebaseConfig = {

apiKey:"YOUR_API_KEY",
authDomain:"YOUR_PROJECT.firebaseapp.com",
projectId:"YOUR_PROJECT_ID",
storageBucket:"YOUR_PROJECT.appspot.com",
messagingSenderId:"XXXX",
appId:"XXXX"

};


const app=initializeApp(firebaseConfig);
const db=getFirestore(app);

let currentModule="bw";
let sapData={};
let editModal;

const MODULES={
bw:"SAP BW",
datasphere:"SAP Datasphere",
sac:"SAC",
hana:"HANA",
bo:"BO/WebI"
};


window.addEventListener("load",()=>{

editModal=new bootstrap.Modal(document.getElementById("editModal"));
initModules();
loadTopics();

});


function initModules(){

const nav=document.getElementById("moduleNav");
nav.innerHTML="";

Object.keys(MODULES).forEach(k=>{

const btn=document.createElement("button");

btn.className="module-btn "+(k===currentModule?"active":"");
btn.innerText=MODULES[k];

btn.onclick=()=>{

currentModule=k;
initModules();
render();

};

nav.appendChild(btn);

});

}


async function loadTopics(){

sapData={};

Object.keys(MODULES).forEach(m=>{

sapData[m]={title:MODULES[m],items:[]};

});

const snapshot=await getDocs(collection(db,"topics"));

snapshot.forEach(d=>{

const data=d.data();

sapData[data.module].items.push({

id:d.id,
name:data.name,
def:data.def,
list:data.list

});

});

render();

}


function render(){

const data=sapData[currentModule];

let html=`<h3>${data.title}</h3>`;

data.items.forEach((item,i)=>{

html+=`

<div class="tech-card" onclick="openEditModal(${i})">

<h5>${item.name}</h5>

<p style="color:#94a3b8">Click to edit</p>

</div>

`;

});

document.getElementById("content-area").innerHTML=html;

}


window.openEditModal=function(i){

document.getElementById("editIndex").value=i??"";

if(i!=null){

const t=sapData[currentModule].items[i];

editName.value=t.name;
editDef.value=t.def;
editList.value=t.list.join("\n");

}else{

editName.value="";
editDef.value="";
editList.value="";

}

editModal.show();

}


window.saveTopic=async function(){

const idx=editIndex.value;

const item={

module:currentModule,
name:editName.value,
def:editDef.value,
list:editList.value.split("\n")

};

if(idx===""){

await addDoc(collection(db,"topics"),item);

}else{

const id=sapData[currentModule].items[idx].id;

await updateDoc(doc(db,"topics",id),item);

}

editModal.hide();

loadTopics();

}


window.deleteTopic=async function(){

const idx=editIndex.value;

if(idx==="")return;

const id=sapData[currentModule].items[idx].id;

await deleteDoc(doc(db,"topics",id));

editModal.hide();

loadTopics();

}


window.searchTech=function(){

const term=searchInput.value.toLowerCase();

document.querySelectorAll(".tech-card").forEach(c=>{

c.style.display=c.innerText.toLowerCase().includes(term)?"":"none";

});

}

</script>

</body>
</html>
